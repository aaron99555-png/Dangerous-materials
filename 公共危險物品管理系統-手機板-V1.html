<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BML 公共危險品管理系統</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- SheetJS (Excel) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            benq: {
              main: '#5C2483',
              dark: '#4A1D6A',
              light: '#f5f3f7'
            }
          }
        }
      }
    }
  </script>
  <style>
    /* 自訂捲軸樣式 */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>
<!-- 將 body 嚴格綁定螢幕高度，所有滾動由內部容器負責 -->
<body class="h-screen w-screen overflow-hidden bg-slate-50 text-slate-800 font-sans flex flex-col relative">

  <!-- 庫存超標預警 Modal -->
  <div id="warningModal" class="fixed inset-0 bg-slate-900/50 hidden items-center justify-center z-[100] backdrop-blur-sm">
    <div class="bg-white rounded-xl shadow-2xl p-6 w-full max-w-md mx-4 border-t-4 border-red-500">
      <div class="flex items-center gap-3 text-red-600 mb-4">
        <i data-lucide="alert-triangle" class="w-6 h-6"></i>
        <h3 class="text-lg font-bold">庫存超過申請量警告</h3>
      </div>
      <p id="modalMsg" class="text-slate-700 font-medium mb-4"></p>
      <div class="bg-red-50/50 p-4 rounded-lg mb-6 text-sm flex flex-col gap-2 border border-red-100">
        <div class="flex justify-between"><span class="text-slate-500">合法申請量:</span> <span id="modalApplyAmt" class="font-semibold text-slate-800"></span></div>
        <div class="flex justify-between"><span class="text-slate-500">該日已有庫存:</span> <span id="modalCurrentTotal" class="font-semibold text-slate-800"></span></div>
        <div class="flex justify-between"><span class="text-slate-500">本次輸入量:</span> <span id="modalInputAmt" class="font-semibold text-blue-600"></span></div>
        <div class="border-t border-red-200/50 my-1"></div>
        <div class="flex justify-between"><span class="text-slate-600 font-medium">預計總庫存:</span> <span id="modalProjected" class="font-semibold text-slate-800"></span></div>
        <div class="flex justify-between text-red-600 font-bold"><span class="text-red-500">超標量:</span> <span id="modalExcess"></span></div>
      </div>
      <div class="flex justify-end gap-3">
        <button id="btnCancelSave" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-md transition-colors font-medium">返回修改</button>
        <button id="btnForceSave" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-md transition-colors font-medium shadow-sm">我了解，仍要儲存</button>
      </div>
    </div>
  </div>

  <!-- Header (固定於頂部) -->
  <header class="shrink-0 bg-benq-main text-white px-6 py-4 shadow-md flex justify-between items-center z-10">
    <div class="flex items-center gap-3">
      <i data-lucide="activity" class="w-6 h-6"></i>
      <h1 class="text-xl font-bold tracking-wide">BML 公共危險品管理系統</h1>
    </div>
    <div id="updateTime" class="text-sm opacity-80"></div>
  </header>

  <!-- 主要框架區塊 (Flex延展) -->
  <div class="flex flex-1 overflow-hidden min-h-0">
    
    <!-- 左側：儲存量輸入區 (可獨立滾動) -->
    <aside class="w-80 shrink-0 bg-white border-r border-slate-200 p-6 flex flex-col shadow-sm z-0 overflow-y-auto">
      <div class="flex items-center gap-2 mb-6 text-benq-main">
        <i data-lucide="plus" class="w-5 h-5"></i>
        <h2 class="text-lg font-semibold">儲存量輸入</h2>
      </div>
      
      <form id="inputForm" class="flex flex-col gap-5">
        <div>
          <label class="block text-sm font-medium text-slate-600 mb-1">盤點日期 *</label>
          <input type="date" id="inputDate" class="w-full border border-slate-300 rounded-md p-2.5 focus:ring-2 focus:ring-benq-main outline-none" required />
        </div>
        
        <div>
          <label class="block text-sm font-medium text-slate-600 mb-1">儲存區域 *</label>
          <select id="inputLocation" class="w-full border border-slate-300 rounded-md p-2.5 focus:ring-2 focus:ring-benq-main outline-none bg-white" required>
            <option value="" disabled selected>請先選擇儲存區域...</option>
            <option value="危險品庫房">危險品庫房</option>
            <option value="原膠室(C4+P1)">原膠室(C4+P1)</option>
          </select>
        </div>

        <div class="relative">
          <label class="block text-sm font-medium text-slate-600 mb-1">化學品名稱 *</label>
          <div class="relative">
            <i data-lucide="search" class="absolute left-3 top-3 w-4 h-4 text-slate-400"></i>
            <input type="text" id="chemSearchInput" placeholder="搜尋並點選化學品..." class="w-full border border-slate-300 rounded-md py-2.5 pl-9 pr-8 focus:ring-2 focus:ring-benq-main outline-none bg-white text-sm" required autocomplete="off" />
            <button type="button" id="btnClearChem" class="absolute right-8 top-3 text-slate-400 hover:text-benq-main hidden">
              <i data-lucide="x" class="w-4 h-4"></i>
            </button>
            <i data-lucide="chevron-down" class="absolute right-3 top-3 w-4 h-4 text-slate-400 pointer-events-none"></i>
          </div>
          <div id="chemDropdown" class="absolute z-50 w-full mt-1 bg-white border border-slate-200 rounded-md shadow-lg max-h-60 overflow-y-auto hidden"></div>
          
          <div id="chemInfoPanel" class="mt-3 p-3 bg-purple-50/50 rounded-lg border border-purple-100 text-sm hidden"></div>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-600 mb-1">儲存量 (kg/L) *</label>
          <div class="relative">
            <input type="number" step="0.01" id="inputStorageAmt" placeholder="輸入數值" class="w-full border border-slate-300 rounded-md p-2.5 focus:ring-2 focus:ring-benq-main outline-none pr-10" required />
            <button type="button" id="btnClearStorage" class="absolute right-12 top-3 text-slate-400 hover:text-benq-main hidden">
              <i data-lucide="x" class="w-4 h-4"></i>
            </button>
            <span class="absolute right-3 top-2.5 text-slate-400 text-sm pointer-events-none">kg/L</span>
          </div>
        </div>

        <div class="flex gap-2 mt-2">
          <button type="submit" id="btnSubmit" class="flex-1 text-white font-medium py-2.5 rounded-md transition-colors shadow-sm bg-benq-main hover:bg-benq-dark">儲存資料</button>
          <button type="button" id="btnClearForm" class="bg-slate-200 hover:bg-slate-300 text-slate-600 px-4 py-2.5 rounded-md transition-colors shadow-sm" title="清除表單重置">
            <i data-lucide="eraser" class="w-5 h-5"></i>
          </button>
        </div>
        <div id="editingBadge" class="text-xs text-amber-600 text-center -mt-3 hidden">目前處於「修改」模式</div>
      </form>
    </aside>

    <!-- 右側：資料呈現與分析區 (此區塊禁止滾動，將滾動權交給下方內容) -->
    <main class="flex-1 p-6 overflow-hidden bg-slate-50 flex flex-col min-w-0 min-h-0">
      
      <!-- 功能列 (固定不滾動) -->
      <div class="shrink-0 bg-white p-4 rounded-lg shadow-sm border border-slate-200 mb-4 flex flex-col xl:flex-row gap-4 xl:items-end justify-between">
        <div class="flex flex-wrap gap-4 items-end flex-1">
          <div>
            <label class="block text-xs text-slate-500 mb-1 flex items-center gap-1"><i data-lucide="calendar" class="w-3 h-3"></i>開始日期</label>
            <input type="date" id="filterStart" class="border border-slate-300 rounded p-1.5 text-sm focus:ring-benq-main outline-none"/>
          </div>
          <div>
            <label class="block text-xs text-slate-500 mb-1 flex items-center gap-1"><i data-lucide="calendar" class="w-3 h-3"></i>結束日期</label>
            <input type="date" id="filterEnd" class="border border-slate-300 rounded p-1.5 text-sm focus:ring-benq-main outline-none"/>
          </div>
          <div>
            <label class="block text-xs text-slate-500 mb-1 flex items-center gap-1"><i data-lucide="map-pin" class="w-3 h-3"></i>儲存區域</label>
            <select id="filterLocation" class="border border-slate-300 rounded p-1.5 text-sm bg-white min-w-[120px] focus:ring-benq-main outline-none">
              <option value="">全區域</option>
            </select>
          </div>
          <div>
            <label class="block text-xs text-slate-500 mb-1 flex items-center gap-1"><i data-lucide="layers" class="w-3 h-3"></i>類別</label>
            <select id="filterClass" class="border border-slate-300 rounded p-1.5 text-sm bg-white min-w-[120px] focus:ring-benq-main outline-none">
              <option value="">全類別</option>
            </select>
          </div>
          <div>
            <label class="block text-xs text-slate-500 mb-1 flex items-center gap-1"><i data-lucide="filter" class="w-3 h-3"></i>化學品名稱</label>
            <div class="relative w-32">
              <input type="text" id="filterName" placeholder="搜尋名稱..." class="w-full border border-slate-300 rounded p-1.5 pr-6 text-sm focus:ring-benq-main outline-none"/>
              <button type="button" id="btnClearFilterName" class="absolute right-1.5 top-2 text-slate-400 hover:text-benq-main hidden">
                <i data-lucide="x" class="w-3.5 h-3.5"></i>
              </button>
            </div>
          </div>
        </div>
        
        <div class="flex gap-2 shrink-0">
          <button id="btnClearFilters" class="flex items-center gap-1 bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded-md text-sm border border-slate-300 transition-colors">
            <i data-lucide="eraser" class="w-4 h-4"></i> 清除篩選
          </button>
          <label class="cursor-pointer flex items-center gap-2 bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1.5 rounded-md text-sm border border-slate-300 transition-colors ml-2">
            <i data-lucide="upload" class="w-4 h-4"></i> 匯入 Excel
            <input type="file" id="fileUpload" accept=".xlsx, .xls" class="hidden" />
          </label>
          <button id="btnExportExcel" class="flex items-center gap-2 bg-green-600 hover:bg-green-700 text-white px-3 py-1.5 rounded-md text-sm transition-colors shadow-sm">
            <i data-lucide="download" class="w-4 h-4"></i> 匯出 Excel
          </button>
          <button id="btnShareLine" class="flex items-center gap-2 bg-[#06C755] hover:bg-[#05b34c] text-white px-3 py-1.5 rounded-md text-sm transition-colors shadow-sm">
            <i data-lucide="share-2" class="w-4 h-4"></i> 分享至 LINE
          </button>
        </div>
      </div>

      <!-- 頁籤選單 (固定不滾動) -->
      <div class="shrink-0 flex bg-white rounded-t-lg border-b border-slate-200 px-2 pt-2 gap-2 shadow-sm">
        <button id="tabSummary" class="px-6 py-2.5 rounded-t-lg font-medium text-sm transition-colors flex items-center gap-2 bg-benq-main text-white shadow-sm">
          <i data-lucide="file-text" class="w-4 h-4"></i> 管制表彙整
        </button>
        <button id="tabList" class="px-6 py-2.5 rounded-t-lg font-medium text-sm transition-colors flex items-center gap-2 bg-slate-100 text-slate-600 hover:bg-slate-200">
          <i data-lucide="list" class="w-4 h-4"></i> 化學品清單
        </button>
        <button id="tabChart" class="px-6 py-2.5 rounded-t-lg font-medium text-sm transition-colors flex items-center gap-2 bg-slate-100 text-slate-600 hover:bg-slate-200">
          <i data-lucide="activity" class="w-4 h-4"></i> 趨勢圖表
        </button>
      </div>

      <!-- 🌟 內容區塊 (動態捲軸完美作用的關鍵：flex-1, min-h-0, overflow-y-auto) 🌟 -->
      <div class="flex-1 min-h-0 overflow-y-auto bg-white border border-t-0 border-slate-200 p-6 rounded-b-lg shadow-sm">
        
        <!-- Sheet 1：管制表彙整 -->
        <div id="viewSummary" class="animate-in fade-in duration-300 flex flex-col gap-4">
          <div class="shrink-0 flex items-center justify-between bg-purple-50 p-3 rounded-lg border border-purple-100 shadow-sm">
            <h3 class="text-lg font-bold text-benq-dark flex items-center gap-2">
              <i data-lucide="file-text" class="w-5 h-5"></i> 管制表彙整
            </h3>
            <div class="flex items-center gap-2">
              <label class="text-sm text-benq-dark font-medium">盤點日：</label>
              <select id="reportDateSelect" class="border border-purple-300 rounded p-1.5 text-sm bg-white focus:ring-benq-main outline-none min-w-[120px]"></select>
            </div>
          </div>
          <!-- 內部表單容器，高度自由長高，由外層 parent 控制滾動 -->
          <div id="summaryContainer" class="flex flex-col gap-6"></div>
        </div>

        <!-- Sheet 2：化學品清單 -->
        <div id="viewList" class="animate-in fade-in duration-300 hidden flex-col">
          <div class="shrink-0 p-3 bg-purple-50 border border-purple-100 rounded-t-lg flex justify-between items-center">
            <h3 class="font-bold text-benq-dark flex items-center gap-2">
              <i data-lucide="list" class="w-4 h-4"></i> 化學品清單紀錄
            </h3>
            <span id="listCount" class="text-xs bg-purple-100 text-benq-main px-2 py-1 rounded-full"></span>
          </div>
          <div class="overflow-x-auto border border-t-0 border-slate-200 rounded-b-lg">
            <table class="w-full text-sm text-left break-words">
              <thead class="text-xs text-slate-600 bg-slate-50 uppercase sticky top-0 shadow-sm z-10">
                <tr>
                  <th class="px-4 py-3 border-b border-slate-200">盤點日期</th>
                  <th class="px-4 py-3 border-b border-slate-200">儲存場所</th>
                  <th class="px-4 py-3 border-b border-slate-200">標示版歸類</th>
                  <th class="px-4 py-3 border-b border-slate-200">類別</th>
                  <th class="px-4 py-3 border-b border-slate-200">化學品名稱</th>
                  <th class="px-4 py-3 border-b border-slate-200 text-right">儲存量</th>
                  <th class="px-4 py-3 border-b border-slate-200 text-right">管制量</th>
                  <th class="px-4 py-3 border-b border-slate-200 text-center">倍數</th>
                  <th class="px-4 py-3 border-b border-slate-200 text-center font-bold w-24">操作</th>
                </tr>
              </thead>
              <tbody id="listBody"></tbody>
            </table>
          </div>
        </div>

        <!-- Sheet 3：趨勢圖表 -->
        <div id="viewChart" class="animate-in fade-in duration-300 hidden flex-col min-h-[500px]">
          <h3 class="shrink-0 text-lg font-semibold text-benq-dark mb-4 flex items-center gap-2">
            <i data-lucide="activity" class="w-4 h-4 text-benq-main"></i> 儲存量變化趨勢圖 (依化學品)
          </h3>
          <div class="flex-1 w-full relative min-h-[400px]">
            <div id="chartNoData" class="absolute inset-0 flex items-center justify-center bg-white/80 z-10 text-slate-500 hidden">尚無符合條件的資料</div>
            <canvas id="myChart"></canvas>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script>
    // --- 初始設定與資料 ---
    const baseChemicals = [
      { name: 'SAIVINOL PL-7930', category: '添加劑', petroleumClass: '第一石油類', flashPoint: '-10', controlAmt: 200 },
      { name: 'SAIVINOL PL-7701', category: '添加劑', petroleumClass: '第一石油類', flashPoint: '-10', controlAmt: 200 },
      { name: 'SAIVINOL PL-0528', category: '添加劑', petroleumClass: '第一石油類', flashPoint: '-10', controlAmt: 200 },
      { name: 'RE03038', category: '感壓膠', petroleumClass: '第二石油類', flashPoint: '40', controlAmt: 1000 },
      { name: 'RE03312', category: '感壓膠', petroleumClass: '第二石油類', flashPoint: '31', controlAmt: 1000 },
      { name: 'HE-3110', category: '添加劑', petroleumClass: '第一石油類', flashPoint: '-4.4', controlAmt: 200 },
      { name: 'DISPERBYK-2150', category: '添加劑', petroleumClass: '第二石油類', flashPoint: '44', controlAmt: 1000 },
      { name: 'SAIVINOL ADDITIVE S-775B', category: '添加劑', petroleumClass: '第一石油類', flashPoint: '-5', controlAmt: 200 },
      { name: 'SAIVINOL ADDITIVE S-1', category: '添加劑', petroleumClass: '第一石油類', flashPoint: '5', controlAmt: 200 },
      { name: 'SAIVINOL HARDENER M-2', category: '添加劑', petroleumClass: '第一石油類', flashPoint: '5', controlAmt: 200 },
      { name: 'SAIVINOL HARDENER K-904B', category: '添加劑', petroleumClass: '第二石油類', flashPoint: '27.5', controlAmt: 1000 },
      { name: 'SAIVINOL HARDENER K-901', category: '添加劑', petroleumClass: '第一石油類', flashPoint: '-4', controlAmt: 200 },
      { name: 'AD75', category: '添加劑', petroleumClass: '第二石油類', flashPoint: '53', controlAmt: 1000 },
      { name: '丙二醇甲醚醋酸酯', category: '丙二醇甲醚醋酸酯', petroleumClass: '第二石油類', flashPoint: '42', controlAmt: 1000 },
      { name: '丙二醇甲醚', category: '丙二醇甲醚', petroleumClass: '第二石油類', flashPoint: '31', controlAmt: 1000 },
      { name: 'CA-190T', category: '添加劑', petroleumClass: '第一石油類', flashPoint: '4', controlAmt: 200 },
      { name: 'TAKENATETM D-262', category: '添加劑', petroleumClass: '第二石油類', flashPoint: '', controlAmt: 200 },
      { name: '乙酸乙脂', category: '乙酸乙脂', petroleumClass: '第一石油類', flashPoint: '-4', controlAmt: 200 },
      { name: '丁酮', category: '丁酮', petroleumClass: '第一石油類', flashPoint: '-9', controlAmt: 200 },
      { name: '乙酸正丙脂', category: '乙酸正丙脂', petroleumClass: '第一石油類', flashPoint: '14', controlAmt: 200 },
      { name: 'C0301廢棄物(第一石油類)', category: 'C0301廢棄物(第一石油類)', petroleumClass: '第一石油類', flashPoint: '', controlAmt: 200 },
      { name: '乙酸正丁酯', category: '乙酸正丁酯', petroleumClass: '第二石油類', flashPoint: '22', controlAmt: 1000 },
      { name: '正丁醇', category: '正丁醇', petroleumClass: '第二石油類', flashPoint: '35', controlAmt: 1000 },
      { name: 'C0301廢棄物(第二石油類)', category: 'C0301廢棄物(第二石油類)', petroleumClass: '第二石油類', flashPoint: '', controlAmt: 1000 },
      { name: '二甲苯', category: '二甲苯', petroleumClass: '第一石油類', flashPoint: '25', controlAmt: 200 },
      { name: '異丙醇', category: '異丙醇', petroleumClass: '酒精類', flashPoint: '12', controlAmt: 400 },
      { name: 'UV感壓膠', category: 'UV感壓膠', petroleumClass: '第三石油類', flashPoint: '100', controlAmt: 2000 }
    ];

    const defaultChemicals = [];
    let chemIdCounter = 1;
    ['危險品庫房', '原膠室(C4+P1)'].forEach(loc => {
      baseChemicals.forEach(c => {
        defaultChemicals.push({
          id: String(chemIdCounter++),
          name: c.name,
          location: loc,
          category: c.category,
          petroleumClass: c.petroleumClass,
          flashPoint: c.flashPoint,
          controlAmt: c.controlAmt
        });
      });
    });

    const applicationRules = {
      '危險品庫房': [
        { category: '添加劑', petroleumClass: '第一石油類', controlAmt: 200, applyAmt: 7769, applyMultiple: 38.84 },
        { category: '乙酸乙脂', petroleumClass: '第一石油類', controlAmt: 200, applyAmt: 7520, applyMultiple: 37.60 },
        { category: '丁酮', petroleumClass: '第一石油類', controlAmt: 200, applyAmt: 660, applyMultiple: 3.30 },
        { category: '乙酸正丙脂', petroleumClass: '第一石油類', controlAmt: 200, applyAmt: 720, applyMultiple: 3.6 },
        { category: 'C0301廢棄物(第一石油類)', petroleumClass: '第一石油類', controlAmt: 200, applyAmt: 9600, applyMultiple: 48 },
        { category: '丙二醇甲醚醋酸酯', petroleumClass: '第二石油類', controlAmt: 1000, applyAmt: 1520, applyMultiple: 1.52 },
        { category: '乙酸正丁酯', petroleumClass: '第二石油類', controlAmt: 1000, applyAmt: 7200, applyMultiple: 7.20 },
        { category: '正丁醇', petroleumClass: '第二石油類', controlAmt: 1000, applyAmt: 1650, applyMultiple: 1.65 },
        { category: '添加劑', petroleumClass: '第二石油類', controlAmt: 1000, applyAmt: 6203, applyMultiple: 6.2 },
        { category: '感壓膠', petroleumClass: '第二石油類', controlAmt: 1000, applyAmt: 33480, applyMultiple: 33.48 },
        { category: 'C0301廢棄物(第二石油類)', petroleumClass: '第二石油類', controlAmt: 1000, applyAmt: 16000, applyMultiple: 16 },
        { category: '添加劑', petroleumClass: '第三石油類', controlAmt: 2000, applyAmt: 500, applyMultiple: 0.25 },

    // --- 初始化 ---
    function init() {
      lucide.createIcons();
      initMockData();
      DOM.updateTime.innerText = `資料更新時間：${new Date().toLocaleString('zh-TW')}`;
      
      DOM.inputDate.value = state.formData.date;
      DOM.filterStart.value = state.filters.startDate;
      DOM.filterEnd.value = state.filters.endDate;

      updateFilterDropdowns();
      attachEventListeners();
      processData();
    }

    // --- 資料處理核心 ---
    function processData() {
      const fullData = state.inventoryData.map(record => {
        const c = state.chemicals.find(x => x.id === record.chemId) || {};
        return {
          ...record,
          chemName: c.name || '未知化學品',
          location: c.location || '未知場所',
          category: c.category || '未分類',
          petroleumClass: c.petroleumClass || '未分類',
          flashPoint: c.flashPoint || '',
          controlAmt: c.controlAmt || 1,
          multiple: c.controlAmt ? (record.storageAmt / c.controlAmt).toFixed(2) : 'N/A'
        };
      }).sort((a, b) => new Date(b.date) - new Date(a.date));

      state.filteredData = fullData.filter(record => {
        let pass = true;
        if (state.filters.startDate) pass = pass && new Date(record.date) >= new Date(state.filters.startDate);
        if (state.filters.endDate) pass = pass && new Date(record.date) <= new Date(state.filters.endDate);
        if (state.filters.chemName) pass = pass && record.chemName.toLowerCase().includes(state.filters.chemName.toLowerCase());
        if (state.filters.location) pass = pass && record.location === state.filters.location;
        if (state.filters.petroleumClass) pass = pass && record.petroleumClass === state.filters.petroleumClass;
        return pass;
      });

      // Update Report Date Options
      const availableDates = [...new Set(state.filteredData.map(d => d.date))];
      DOM.reportDateSelect.innerHTML = availableDates.length > 0 
        ? availableDates.map(d => `<option value="${d}">${d}</option>`).join('')
        : `<option value="">無資料</option>`;
      
      if (availableDates.length > 0 && !availableDates.includes(state.selectedReportDate)) {
        state.selectedReportDate = availableDates[0];
      } else if (availableDates.length === 0) {
        state.selectedReportDate = '';
      }
      DOM.reportDateSelect.value = state.selectedReportDate;

      renderApp();
    }

    // --- 畫面更新 ---
    function renderApp() {
      updateTabsUI();
      if (state.activeTab === 'summary') renderSummary();
      if (state.activeTab === 'list') renderList();
      if (state.activeTab === 'chart') renderChart();
      lucide.createIcons();
    }

    function updateTabsUI() {
      ['summary', 'list', 'chart'].forEach(tab => {
        const btn = DOM.tabs[tab];
        const view = DOM.views[tab];
        if (state.activeTab === tab) {
          btn.className = 'px-6 py-2.5 rounded-t-lg font-medium text-sm transition-colors flex items-center gap-2 bg-benq-main text-white shadow-sm';
          view.classList.remove('hidden');
        } else {
          btn.className = 'px-6 py-2.5 rounded-t-lg font-medium text-sm transition-colors flex items-center gap-2 bg-slate-100 text-slate-600 hover:bg-slate-200';
          view.classList.add('hidden');
        }
      });
    }

    function updateFilterDropdowns() {
      const locs = [...new Set(state.chemicals.map(c => c.location))];
      const petros = [...new Set(state.chemicals.map(c => c.petroleumClass))];
      
      DOM.filterLocation.innerHTML = '<option value="">全區域</option>' + locs.map(l => `<option value="${l}">${l}</option>`).join('');
      DOM.filterClass.innerHTML = '<option value="">全類別</option>' + petros.map(p => `<option value="${p}">${p}</option>`).join('');
      
      DOM.filterLocation.value = state.filters.location;
      DOM.filterClass.value = state.filters.petroleumClass;
    }

    // --- 渲染 管制表彙整 ---
    function renderSummary() {
      const reportData = state.filteredData.filter(d => d.date === state.selectedReportDate);
      let html = '';

      ['危險品庫房', '原膠室'].forEach(loc => {
        if (state.filters.location && loc !== state.filters.location) return;

        const locData = reportData.filter(d => d.location.includes(loc));
        const rules = applicationRules[loc] || [];
        const groupedRules = {};
        
        rules.forEach(r => {
          if (!groupedRules[r.petroleumClass]) groupedRules[r.petroleumClass] = [];
          groupedRules[r.petroleumClass].push(r);
        });

        const leftoverItems = locData.filter(d => !rules.some(r => r.category === d.category && r.petroleumClass === d.petroleumClass));
        leftoverItems.forEach(item => {
          const pClass = item.petroleumClass || '未分類';
          if (!groupedRules[pClass]) groupedRules[pClass] = [];
          if (!groupedRules[pClass].some(r => r.category === item.category && r.isLeftover)) {
            groupedRules[pClass].push({ category: item.category, petroleumClass: pClass, controlAmt: item.controlAmt || 1, applyAmt: 0, applyMultiple: 0, isLeftover: true });
          }
        });

        if (Object.keys(groupedRules).length === 0) return;

        let totalRowsCount = 0;
        let locTotalActualMultiple = 0, locTotalApplyMultiple = 0, locTotalStorageAmt = 0;

        Object.keys(groupedRules).forEach(pClass => {
          totalRowsCount += groupedRules[pClass].length;
          groupedRules[pClass].forEach(rule => {
            const items = locData.filter(d => d.category === rule.category && d.petroleumClass === pClass);
            const actualStorage = items.reduce((sum, i) => sum + i.storageAmt, 0);
            locTotalActualMultiple += actualStorage / rule.controlAmt;
            locTotalApplyMultiple += rule.applyMultiple;
            locTotalStorageAmt += actualStorage;
          });
        });

        if (totalRowsCount === 0) totalRowsCount = 1;
        const isLocPass = locTotalActualMultiple <= locTotalApplyMultiple;
        const headerColor = loc === '危險品庫房' ? 'bg-red-50 border-red-200 text-red-900' : 'bg-purple-50 border-purple-200 text-benq-dark';

        html += `
          <div class="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden flex flex-col shrink-0">
            <div class="p-3 border-b flex flex-col md:flex-row gap-3 justify-between items-center ${headerColor}">
              <h3 class="font-bold flex items-center gap-2 text-lg">
                <i data-lucide="map-pin" class="w-5 h-5"></i> ${loc === '原膠室' ? '原膠室(C4+P1)' : loc}
              </h3>
              <div class="flex items-center gap-4 text-sm bg-white/70 px-4 py-2 rounded-md border shadow-sm border-slate-200/50">
                <div class="flex flex-col md:flex-row md:items-center gap-1 md:gap-2">
                  <span class="text-slate-500 font-medium text-xs md:text-sm">實際總儲存量:</span>
                  <span class="font-bold text-benq-main text-base">${locTotalStorageAmt > 0 ? locTotalStorageAmt.toFixed(2) : '0.00'}</span> 
                  <span class="text-slate-400 text-xs">kg/L</span>
                </div>
                <div class="w-px h-6 bg-slate-300 hidden md:block"></div>
                <div class="flex flex-col md:flex-row md:items-center gap-1 md:gap-2">
                  <span class="text-slate-500 font-medium text-xs md:text-sm">實際總倍數:</span>
                  <span class="font-bold text-benq-main text-base">${locTotalActualMultiple > 0 ? locTotalActualMultiple.toFixed(2) : '0.00'}</span>
                </div>
                <div class="w-px h-6 bg-slate-300 hidden md:block"></div>
                <div class="font-bold px-2 py-1 rounded text-xs md:text-sm ${isLocPass ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                  ${isLocPass ? '✅ 總量符合' : '❌ 總量超標'}
                </div>
              </div>
            </div>
            <div class="overflow-x-auto">
              <table class="w-full text-sm text-left border-collapse break-words">
                <thead class="text-xs text-slate-700 bg-slate-100 border-b-2 border-slate-300 text-center">
                  <tr>
                    <th rowspan="2" class="px-3 py-3 border border-slate-200 align-middle bg-slate-200/50 w-24">危物種類</th>
                    <th colspan="5" class="px-3 py-2 border border-slate-200 bg-purple-100/60 text-benq-dark text-sm tracking-wide">${loc === '原膠室' ? '原膠室(C4+P1)' : loc} 合法申請量(標示版)</th>
                    <th colspan="3" class="px-3 py-2 border border-slate-200 bg-amber-100/60">實際儲存量及符合度依分類</th>
                    <th rowspan="2" class="px-3 py-3 border border-slate-200 align-middle bg-emerald-100/60 w-32">危物種類<br/>符合度</th>
                  </tr>
                  <tr>
                    <th class="px-3 py-2 border border-slate-200 bg-purple-50 w-28">標示版分類</th>
                    <th class="px-3 py-2 border border-slate-200 bg-purple-50 w-24">申請量</th>
                    <th class="px-3 py-2 border border-slate-200 bg-purple-50 w-24">申請量加總</th>
                    <th class="px-3 py-2 border border-slate-200 bg-purple-50 w-20">倍數</th>
                    <th class="px-3 py-2 border border-slate-200 bg-purple-50 w-20">倍數加總</th>
                    <th class="px-3 py-2 border border-slate-200 bg-amber-50 w-24">實際儲存量</th>
                    <th class="px-3 py-2 border border-slate-200 bg-amber-50 w-24">超標量</th>
                    <th class="px-3 py-2 border border-slate-200 bg-amber-50 w-24">符合度</th>
                  </tr>
                </thead>
                <tbody>
        `;

        Object.keys(groupedRules).forEach((pClass, pIdx) => {
          const classRules = groupedRules[pClass];
          const classRowSpan = classRules.length;
          
          let classApplySum = 0, classApplyMultSum = 0, classActualMultipleSum = 0;
          classRules.forEach(r => {
            classApplySum += r.applyAmt; classApplyMultSum += r.applyMultiple;
            const items = locData.filter(d => d.category === r.category && d.petroleumClass === pClass);
            classActualMultipleSum += items.reduce((sum, i) => sum + i.storageAmt, 0) / r.controlAmt;
          });
          const classIsPass = classActualMultipleSum <= classApplyMultSum;

          classRules.forEach((rule, rIdx) => {
            const items = locData.filter(d => d.category === rule.category && d.petroleumClass === pClass);
            const actualStorage = items.reduce((sum, i) => sum + i.storageAmt, 0);
            const actualMultiple = actualStorage / rule.controlAmt;
            const excessAmt = actualStorage > rule.applyAmt ? actualStorage - rule.applyAmt : 0;
            const isPass = rule.isLeftover ? false : actualMultiple <= rule.applyMultiple;

            const trClass = rule.isLeftover ? "bg-red-50/40" : "hover:bg-slate-50/80";
            
            html += `<tr class="${trClass}">`;
            
            if (rIdx === 0) {
              html += `<td rowspan="${classRowSpan}" class="px-3 py-3 border border-slate-200 font-bold text-center align-middle bg-slate-50/50">${pClass}</td>`;
            }
            
            html += `<td class="px-3 py-3 border border-slate-200 font-medium text-slate-800 text-center">${rule.category} ${rule.isLeftover ? '<span class="text-red-500 text-xs block">(無申請)</span>' : ''}</td>`;
            html += `<td class="px-3 py-3 border border-slate-200 text-right text-slate-600">${rule.applyAmt.toFixed(2)}</td>`;
            
            if (rIdx === 0) html += `<td rowspan="${classRowSpan}" class="px-3 py-3 border border-slate-200 text-center align-middle bg-purple-50/40 font-bold text-benq-main text-base">${classApplySum.toFixed(2)}</td>`;
            html += `<td class="px-3 py-3 border border-slate-200 text-right text-slate-600">${rule.applyMultiple.toFixed(2)}</td>`;
            if (rIdx === 0) html += `<td rowspan="${classRowSpan}" class="px-3 py-3 border border-slate-200 text-center align-middle bg-purple-50/40 font-bold text-benq-main text-base">${classApplyMultSum.toFixed(2)}</td>`;

            html += `<td class="px-3 py-3 border border-slate-200 text-right text-benq-main font-bold">${actualStorage > 0 ? actualStorage.toFixed(2) : '-'}</td>`;
            html += `<td class="px-3 py-3 border border-slate-200 text-right font-medium ${excessAmt > 0 ? 'text-red-600' : 'text-slate-400'}">${excessAmt > 0 ? excessAmt.toFixed(2) : '-'}</td>`;
            html += `<td class="px-3 py-3 border border-slate-200 text-center"><span class="px-2 py-1 rounded text-xs font-bold whitespace-nowrap ${isPass ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${isPass ? '符合' : '不符合'}</span></td>`;

            if (rIdx === 0) {
              html += `
                <td rowspan="${classRowSpan}" class="px-3 py-3 border border-slate-200 text-center align-middle bg-slate-50">
                  <div class="flex flex-col items-center justify-center gap-1.5">
                    <span class="text-xs text-slate-500 font-medium mt-1">實際倍數</span>
                    <span class="text-base font-bold ${classIsPass ? 'text-benq-main' : 'text-red-600'}">${classActualMultipleSum.toFixed(2)}</span>
                    <span class="px-2 py-1 rounded text-xs font-bold whitespace-nowrap mt-0.5 ${classIsPass ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                      ${classIsPass ? '✅ 符合' : '❌ 超標'}
                    </span>
                  </div>
                </td>
              `;
            }
            html += `</tr>`;
          });
        });

        html += `</tbody></table></div></div>`;
      });
      
      DOM.summaryContainer.innerHTML = html || '<div class="text-center text-slate-400 py-8">查無資料</div>';
    }

    // --- 渲染 化學品清單 ---
    function renderList() {
      DOM.listCount.innerText = `共 ${state.filteredData.length} 筆明細`;
      if (state.filteredData.length === 0) {
        DOM.listBody.innerHTML = `<tr><td colspan="9" class="px-4 py-8 text-center text-slate-400">尚無符合條件的清單資料</td></tr>`;
        return;
      }
      
      DOM.listBody.innerHTML = state.filteredData.map(row => `
        <tr class="bg-white border-b border-slate-100 hover:bg-slate-50">
          <td class="px-4 py-2.5 whitespace-nowrap text-slate-600">${row.date}</td>
          <td class="px-4 py-2.5 text-slate-700">${row.location}</td>
          <td class="px-4 py-2.5 text-slate-700">${row.category}</td>

          <td class="px-4 py-2.5 text-center">

          </td>
          <td class="px-4 py-2.5 text-center">
            <div class="flex items-center justify-center gap-3">
              <button onclick="handleEdit('${row.id}')" class="text-blue-600 hover:text-blue-800 transition-colors"><i data-lucide="edit" class="w-4 h-4"></i></button>
              <button onclick="handleDelete('${row.id}')" class="text-red-500 hover:text-red-700 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    // --- 渲染 圖表 ---
    function renderChart() {
      if (!window.Chart) return;
      const canvas = document.getElementById('myChart');
      if (state.filteredData.length === 0) {
        DOM.chartNoData.classList.remove('hidden');
        if (state.chartInstance) { state.chartInstance.destroy(); state.chartInstance = null; }
        return;
      }
      DOM.chartNoData.classList.add('hidden');

      const dates = [...new Set(state.filteredData.map(d => d.date))].sort((a, b) => new Date(a) - new Date(b));
      const uniqueChems = [...new Set(state.filteredData.map(d => d.chemName))];

      const datasets = uniqueChems.map((chemName, index) => {
        const dataPoints = dates.map(date => {
          const record = state.filteredData.find(d => d.date === date && d.chemName === chemName);
          return record ? record.storageAmt : null;
        });
        return {
          label: chemName, data: dataPoints,
          borderColor: chartColors[index % chartColors.length], backgroundColor: chartColors[index % chartColors.length],
          tension: 0.3, spanGaps: true, pointRadius: 4, borderWidth: 2
        };
      });

      if (state.chartInstance) state.chartInstance.destroy();
      state.chartInstance = new Chart(canvas, {
        type: 'line', data: { labels: dates, datasets: datasets },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { position: 'right' }, tooltip: { callbacks: { label: c => `${c.dataset.label}: ${c.parsed.y} kg/L` } } },
          scales: { y: { beginAtZero: true, title: { display: true, text: '儲存量 (kg/L)' } }, x: { title: { display: true, text: '日期' } } }
        }
      });
    }

    // --- 表單與下拉選單邏輯 ---
    function updateDropdown() {
      const loc = DOM.inputLocation.value;
      if (!loc) {
        DOM.chemDropdown.innerHTML = `<div class="px-4 py-3 text-sm text-amber-600 text-center font-medium">請先選擇上方的「儲存區域」</div>`;
        return;
      }

      const searchStr = DOM.chemSearchInput.value.toLowerCase();
      const filtered = state.chemicals.filter(c => c.location === loc && (c.name.toLowerCase().includes(searchStr) || c.category.includes(searchStr)));
      
      if (searchStr) DOM.btnClearChem.classList.remove('hidden');
      else DOM.btnClearChem.classList.add('hidden');

      if (filtered.length === 0) {
        DOM.chemDropdown.innerHTML = `<div class="px-4 py-3 text-sm text-slate-500 text-center">該區域查無符合的化學品</div>`;
      } else {
        DOM.chemDropdown.innerHTML = filtered.map(c => `
          <div onclick="selectChem('${c.id}', '${c.name}')" class="px-4 py-2 hover:bg-purple-50 cursor-pointer border-b border-slate-100 last:border-0">
            <div class="font-medium text-slate-800">${c.name}</div>
            <div class="text-xs text-slate-500 flex justify-between mt-0.5"><span>${c.category}</span><span>${c.petroleumClass}</span></div>
          </div>
        `).join('');
      }
    }

    window.selectChem = function(id, name) {
      state.formData.chemId = id;
      DOM.chemSearchInput.value = name;
      DOM.chemDropdown.classList.add('hidden');
      updateChemInfoPanel();
    };

    function updateChemInfoPanel() {
      const chem = state.chemicals.find(c => c.id === state.formData.chemId);
      if (!chem) { DOM.chemInfoPanel.classList.add('hidden'); return; }

      let appliedInfo = '無對應申請量';
      const rules = applicationRules[chem.location] || [];
      const rule = rules.find(r => r.category === chem.category && r.petroleumClass === chem.petroleumClass);
      if (rule) appliedInfo = `${rule.applyAmt} L (${rule.applyMultiple} 倍)`;

      DOM.chemInfoPanel.innerHTML = `
        <h4 class="font-bold text-benq-dark mb-2 border-b border-purple-200 pb-1">「${chem.location}」合法申請資訊</h4>
        <div class="grid grid-cols-1 gap-1.5 text-slate-700">
          <div class="flex justify-between"><span class="text-slate-500">合法申請量</span> <span class="font-bold text-benq-main">${appliedInfo}</span></div>
          <div class="flex justify-between"><span class="text-slate-500">管制量基準</span> <span class="font-medium">${chem.controlAmt} L</span></div>
          <div class="flex justify-between"><span class="text-slate-500">類別</span> <span class="font-medium text-amber-700">${chem.petroleumClass}</span></div>
          <div class="flex justify-between"><span class="text-slate-500">標示版分類</span> <span class="font-medium">${chem.category}</span></div>
          <div class="flex justify-between"><span class="text-slate-500">閃火點</span> <span class="font-medium">${chem.flashPoint ? chem.flashPoint+' °C' : '無紀錄'}</span></div>
        </div>
      `;
      DOM.chemInfoPanel.classList.remove('hidden');
    }

    window.handleEdit = function(id) {
      const record = state.inventoryData.find(r => r.id === id);
      if(!record) return;
      state.editingId = id;
      state.formData = { date: record.date, chemId: record.chemId, storageAmt: record.storageAmt };
      DOM.inputDate.value = record.date;
      DOM.inputStorageAmt.value = record.storageAmt;
      const c = state.chemicals.find(x => x.id === record.chemId);
      if (c) {
        DOM.inputLocation.value = c.location;
        DOM.chemSearchInput.value = c.name;
        updateChemInfoPanel();
      }
      DOM.btnSubmit.innerText = '儲存修改';
      DOM.btnSubmit.classList.replace('bg-benq-main', 'bg-amber-600');
      DOM.btnSubmit.classList.replace('hover:bg-benq-dark', 'hover:bg-amber-700');
      DOM.editingBadge.classList.remove('hidden');
    };

    window.handleDelete = function(id) {
      if (confirm('確定要刪除這筆庫存紀錄嗎？這將無法復原。')) {
        state.inventoryData = state.inventoryData.filter(r => r.id !== id);
        processData();
      }
    };

    // --- 事件綁定 ---
    function attachEventListeners() {
      DOM.tabs.summary.addEventListener('click', () => { state.activeTab = 'summary'; renderApp(); });
      DOM.tabs.list.addEventListener('click', () => { state.activeTab = 'list'; renderApp(); });
      DOM.tabs.chart.addEventListener('click', () => { state.activeTab = 'chart'; renderApp(); });

      DOM.inputLocation.addEventListener('change', () => {
        DOM.chemSearchInput.value = '';
        state.formData.chemId = '';
        DOM.chemInfoPanel.classList.add('hidden');
        DOM.chemDropdown.classList.remove('hidden');
        updateDropdown();
      });

      DOM.chemSearchInput.addEventListener('focus', () => { 
        if(!DOM.inputLocation.value) {
          alert('請先選擇上方的「儲存區域」');
          DOM.inputLocation.focus();
          return;
        }
        DOM.chemDropdown.classList.remove('hidden'); 
        updateDropdown(); 
      });
      DOM.chemSearchInput.addEventListener('input', () => { state.formData.chemId = ''; DOM.chemInfoPanel.classList.add('hidden'); updateDropdown(); });
      DOM.btnClearChem.addEventListener('click', () => { DOM.chemSearchInput.value = ''; state.formData.chemId = ''; DOM.chemDropdown.classList.add('hidden'); DOM.btnClearChem.classList.add('hidden'); DOM.chemInfoPanel.classList.add('hidden'); });
      
      DOM.inputStorageAmt.addEventListener('input', () => {
        if (DOM.inputStorageAmt.value) DOM.btnClearStorage.classList.remove('hidden');
        else DOM.btnClearStorage.classList.add('hidden');
      });
      DOM.btnClearStorage.addEventListener('click', () => { DOM.inputStorageAmt.value = ''; DOM.btnClearStorage.classList.add('hidden'); });

      DOM.btnClearForm.addEventListener('click', () => {
        state.formData = { date: todayStr, chemId: '', storageAmt: '' };
        state.editingId = null;
        DOM.inputDate.value = todayStr;
        DOM.inputLocation.value = '';
        DOM.chemSearchInput.value = '';
        DOM.inputStorageAmt.value = '';
        DOM.chemInfoPanel.classList.add('hidden');
        DOM.btnClearChem.classList.add('hidden');
        DOM.btnClearStorage.classList.add('hidden');
        DOM.btnSubmit.innerText = '儲存資料';
        DOM.btnSubmit.classList.replace('bg-amber-600', 'bg-benq-main');
        DOM.btnSubmit.classList.replace('hover:bg-amber-700', 'hover:bg-benq-dark');
        DOM.editingBadge.classList.add('hidden');
      });

      document.getElementById('inputForm').addEventListener('submit', (e) => {
        e.preventDefault();
        state.formData.date = DOM.inputDate.value;
        state.formData.storageAmt = DOM.inputStorageAmt.value;
        
        if (!DOM.inputLocation.value || !state.formData.date || !state.formData.chemId || !state.formData.storageAmt) {
          return alert('請填寫完整資料 (請先選擇區域與化學品)');
        }

        const chem = state.chemicals.find(c => c.id === state.formData.chemId);
        const rules = applicationRules[chem.location] || [];
        const rule = rules.find(r => r.category === chem.category && r.petroleumClass === chem.petroleumClass);

        if (rule) {
          const currentItems = state.inventoryData.filter(d => d.date === state.formData.date && d.id !== state.editingId);
          const currentTotal = currentItems.reduce((sum, item) => {
            const cInfo = state.chemicals.find(c => c.id === item.chemId);
            if (cInfo && cInfo.location === chem.location && cInfo.category === chem.category && cInfo.petroleumClass === chem.petroleumClass) {
              return sum + item.storageAmt;
            }
            return sum;
          }, 0);

          const inputAmt = parseFloat(state.formData.storageAmt);
          const projectedTotal = currentTotal + inputAmt;

          if (projectedTotal > rule.applyAmt) {
            DOM.modalMsg.innerHTML = `「${chem.location}」的「${chem.category} (${chem.petroleumClass})」<br/><span class="text-red-600">庫存超過申請量，請調整庫存周轉率。</span>`;
            DOM.modalApplyAmt.innerText = `${rule.applyAmt.toFixed(2)} L`;
            DOM.modalCurrentTotal.innerText = currentTotal.toFixed(2);
            DOM.modalInputAmt.innerText = `+${inputAmt.toFixed(2)}`;
            DOM.modalProjected.innerText = projectedTotal.toFixed(2);
            DOM.modalExcess.innerText = (projectedTotal - rule.applyAmt).toFixed(2);
            DOM.warningModal.classList.remove('hidden');
            DOM.warningModal.classList.add('flex');
            
            state.pendingSaveAction = () => executeSave();
            return;
          }
        }
        executeSave();
      });

      DOM.btnCancelSave.addEventListener('click', () => { DOM.warningModal.classList.remove('flex'); DOM.warningModal.classList.add('hidden'); });
      DOM.btnForceSave.addEventListener('click', () => { if(state.pendingSaveAction) state.pendingSaveAction(); });

      const applyFilters = () => {
        state.filters.startDate = DOM.filterStart.value;
        state.filters.endDate = DOM.filterEnd.value;
        state.filters.location = DOM.filterLocation.value;
        state.filters.petroleumClass = DOM.filterClass.value;
        state.filters.chemName = DOM.filterName.value;
        if(state.filters.chemName) DOM.btnClearFilterName.classList.remove('hidden');
        else DOM.btnClearFilterName.classList.add('hidden');
        processData();
      };
      
      DOM.filterStart.addEventListener('change', applyFilters);
      DOM.filterEnd.addEventListener('change', applyFilters);
      DOM.filterLocation.addEventListener('change', applyFilters);
      DOM.filterClass.addEventListener('change', applyFilters);
      DOM.filterName.addEventListener('input', applyFilters);
      DOM.btnClearFilterName.addEventListener('click', () => { DOM.filterName.value = ''; applyFilters(); });
      
      DOM.btnClearFilters.addEventListener('click', () => {
        DOM.filterStart.value = todayStr;
        DOM.filterEnd.value = todayStr;
        DOM.filterLocation.value = '';
        DOM.filterClass.value = '';
        DOM.filterName.value = '';
        applyFilters();
      });

      DOM.reportDateSelect.addEventListener('change', (e) => {
        state.selectedReportDate = e.target.value;
        renderSummary();
        lucide.createIcons();
      });

      DOM.btnExportExcel.addEventListener('click', exportExcel);
      DOM.fileUpload.addEventListener('change', handleFileUpload);
      DOM.btnShareLine.addEventListener('click', shareToLine);
    }

    function executeSave() {
      if (state.editingId) {
        state.inventoryData = state.inventoryData.map(item => item.id === state.editingId ? { ...item, date: state.formData.date, chemId: state.formData.chemId, storageAmt: parseFloat(state.formData.storageAmt) } : item);
      } else {
        state.inventoryData.push({ id: crypto.randomUUID(), date: state.formData.date, chemId: state.formData.chemId, storageAmt: parseFloat(state.formData.storageAmt) });
      }
      
      DOM.inputStorageAmt.value = '';
      DOM.btnClearForm.click(); 
      DOM.warningModal.classList.remove('flex'); DOM.warningModal.classList.add('hidden');
      processData();
    }

    function exportExcel() {
      if (!window.XLSX) return alert('Excel 引擎載入中，請稍候重試');
      const ws_data = [['盤點日期', '儲存場所', '標示版歸類', '類別', '化學品名稱', '閃火點', '管制量(L)', '儲存量(kg/L)', '倍數']];
      state.filteredData.forEach(row => {
        ws_data.push([row.date, row.location, row.category, row.petroleumClass, row.chemName, row.flashPoint, row.controlAmt, row.storageAmt, row.multiple]);
      });
      const ws = XLSX.utils.aoa_to_sheet(ws_data);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "化學品庫存");
      XLSX.writeFile(wb, `BML_公共危險品庫存_${new Date().toISOString().split('T')[0]}.xlsx`);
    }

    function handleFileUpload(e) {
      const file = e.target.files[0];
      if (!file || !window.XLSX) return;
      const reader = new FileReader();
      reader.onload = (event) => {
        try {
          const data = new Uint8Array(event.target.result);
          const workbook = XLSX.read(data, { type: 'array' });
          const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
          if (rows.length < 2) return alert('Excel 內無資料');
          
          const h = rows[0];
          const idx = {
            date: h.findIndex(x => typeof x === 'string' && x.includes('日期')),
            loc: h.findIndex(x => typeof x === 'string' && x.includes('場所')),
            name: h.findIndex(x => typeof x === 'string' && x.includes('名稱')),
            cat: h.findIndex(x => typeof x === 'string' && x.includes('標示版歸類')),
            petro: h.findIndex(x => typeof x === 'string' && (x.includes('類別') || x.includes('種類'))),
            flash: h.findIndex(x => typeof x === 'string' && x.includes('閃火點')),
            ctrl: h.findIndex(x => typeof x === 'string' && x.includes('管制量')),
            storage: h.findIndex(x => typeof x === 'string' && x.includes('儲存量'))
          };

          if (idx.date === -1 || idx.name === -1 || idx.storage === -1) return alert('Excel 欄位標題不符');

          const imported = [];
          for (let i = 1; i < rows.length; i++) {
            const c = rows[i]; if (!c || c.length < 3) continue;
            let dStr = c[idx.date];
            if (typeof dStr === 'number') dStr = new Date(new Date(Date.UTC(1899, 11, 30)).getTime() + dStr * 86400000).toISOString().split('T')[0];
            else if (typeof dStr === 'string') dStr = dStr.trim().replace(/\//g, '-').split(' ')[0];

            const name = c[idx.name]?.toString().trim();
            const amt = parseFloat(c[idx.storage]);
            if (!dStr || !name || isNaN(amt)) continue;

            const loc = idx.loc !== -1 ? c[idx.loc]?.toString().trim() : '未分類';
            const cat = idx.cat !== -1 ? c[idx.cat]?.toString().trim() : '未分類';
            const petro = idx.petro !== -1 ? c[idx.petro]?.toString().trim() : '未分類';
            const flash = idx.flash !== -1 ? c[idx.flash]?.toString().trim() : '';
            const ctrl = idx.ctrl !== -1 ? parseFloat(c[idx.ctrl]) : 0;

            let chem = state.chemicals.find(x => x.name === name && x.location === loc);
            if (!chem) {
              chem = { id: crypto.randomUUID(), name, location: loc, category: cat, petroleumClass: petro, flashPoint: flash, controlAmt: ctrl };
              state.chemicals.push(chem);
            }
            imported.push({ id: crypto.randomUUID(), date: dStr, chemId: chem.id, storageAmt: amt });
          }
          state.inventoryData.push(...imported);
          processData();
          alert(`成功從 Excel 匯入 ${imported.length} 筆紀錄`);
        } catch(err) { alert('匯入失敗，請確認檔案格式'); }
      };
      reader.readAsArrayBuffer(file);
      e.target.value = null;
    }

    async function shareToLine() {
      if (!window.XLSX) return alert('Excel 引擎載入中');
      const ws_data = [['盤點日期', '儲存場所', '標示版歸類', '類別', '化學品名稱', '閃火點', '管制量(L)', '儲存量(kg/L)', '倍數']];
      state.filteredData.forEach(row => ws_data.push([row.date, row.location, row.category, row.petroleumClass, row.chemName, row.flashPoint, row.controlAmt, row.storageAmt, row.multiple]));
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(ws_data), "化學品庫存");
      const excelBuffer = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
      const fileName = `BML_公共危險品庫存_${new Date().toISOString().split('T')[0]}.xlsx`;
      const file = new File([excelBuffer], fileName, { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });

      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try { await navigator.share({ title: 'BML 庫存報表', text: '請查收公共危險品庫存資料。', files: [file] }); } 
        catch (err) { console.log('分享取消'); }
      } else {
        alert('您的瀏覽器不支援原生分享，已自動下載 Excel 檔案，請手動傳送。');
        XLSX.writeFile(wb, fileName);
      }
    }

    // 啟動程式
    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
