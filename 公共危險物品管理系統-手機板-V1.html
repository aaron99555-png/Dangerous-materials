<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BML 公共危險品管理系統</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- SheetJS (Excel) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            benq: { main: '#5C2483', dark: '#4A1D6A', light: '#f5f3f7' }
          }
        }
      }
    }
  </script>
  <style>
    /* 自訂捲軸樣式 */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .sort-icon::after { content: ' ↕'; opacity: 0.3; font-size: 0.8em; }
    .sort-asc::after { content: ' ↑'; opacity: 1; color: #5C2483; }
    .sort-desc::after { content: ' ↓'; opacity: 1; color: #5C2483; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 font-sans flex flex-col relative overflow-x-hidden">

  <!-- 庫存超標預警 Modal -->
  <div id="warningModal" class="fixed inset-0 bg-slate-900/50 hidden items-center justify-center z-[100] backdrop-blur-sm p-4">
    <div class="bg-white rounded-xl shadow-2xl p-5 md:p-6 w-full max-w-md border-t-4 border-red-500 max-h-[90vh] overflow-y-auto">
      <div class="flex items-center gap-3 text-red-600 mb-4">
        <i data-lucide="alert-triangle" class="w-6 h-6 shrink-0"></i>
        <h3 class="text-base md:text-lg font-bold">庫存超過申請量警告</h3>
      </div>
      <p id="modalMsg" class="text-slate-700 font-medium mb-4 text-sm md:text-base"></p>
      <div class="bg-red-50/50 p-3 md:p-4 rounded-lg mb-6 text-sm flex flex-col gap-2 border border-red-100">
        <div class="flex justify-between"><span class="text-slate-500">合法申請量:</span> <span id="modalApplyAmt" class="font-semibold text-slate-800"></span></div>
        <div class="flex justify-between"><span class="text-slate-500">該日已有庫存:</span> <span id="modalCurrentTotal" class="font-semibold text-slate-800"></span></div>
        <div class="flex justify-between"><span class="text-slate-500">本次輸入量:</span> <span id="modalInputAmt" class="font-semibold text-blue-600"></span></div>
        <div class="border-t border-red-200/50 my-1"></div>
        <div class="flex justify-between"><span class="text-slate-600 font-medium">預計總庫存:</span> <span id="modalProjected" class="font-semibold text-slate-800"></span></div>
        <div class="flex justify-between text-red-600 font-bold"><span class="text-red-500">超標量:</span> <span id="modalExcess"></span></div>
      </div>
      <div class="flex flex-col-reverse md:flex-row justify-end gap-3">
        <button id="btnCancelSave" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-md transition-colors font-medium text-sm md:text-base">返回修改</button>
        <button id="btnForceSave" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-md transition-colors font-medium shadow-sm text-sm md:text-base">我了解，仍要儲存</button>
      </div>
    </div>
  </div>

  <!-- Header (Sticky) -->
  <header class="sticky top-0 shrink-0 bg-benq-main text-white px-4 md:px-6 py-3 md:py-4 shadow-md flex flex-col sm:flex-row justify-between items-center z-50 gap-2 sm:gap-0">
    <div class="flex items-center gap-2 md:gap-3 w-full sm:w-auto justify-center sm:justify-start">
      <i data-lucide="activity" class="w-5 h-5 md:w-6 md:h-6 shrink-0"></i>
      <h1 class="text-lg md:text-xl font-bold tracking-wide truncate">BML 公共危險品管理系統</h1>
    </div>
    <div id="updateTime" class="text-xs md:text-sm opacity-80 text-center sm:text-right w-full sm:w-auto"></div>
  </header>

  <!-- 主要框架區塊 -->
  <div class="flex flex-col md:flex-row flex-1 w-full max-w-[1600px] mx-auto">
    
    <!-- 左側：儲存量輸入區 -->
    <aside class="w-full md:w-80 shrink-0 bg-white border-b md:border-b-0 md:border-r border-slate-200 p-4 md:p-6 flex flex-col shadow-sm md:sticky md:top-[68px] md:self-start md:h-[calc(100vh-68px)] md:overflow-y-auto z-10">
      <div class="flex items-center gap-2 mb-4 md:mb-6 text-benq-main shrink-0">
        <i data-lucide="plus" class="w-4 h-4 md:w-5 md:h-5"></i>
        <h2 class="text-base md:text-lg font-semibold">儲存量輸入</h2>
      </div>
      
      <form id="inputForm" class="flex flex-col gap-4 md:gap-5">
        <div>
          <label class="block text-xs md:text-sm font-medium text-slate-600 mb-1">盤點日期 *</label>
          <input type="date" id="inputDate" class="w-full border border-slate-300 rounded-md p-2 md:p-2.5 text-sm md:text-base focus:ring-2 focus:ring-benq-main outline-none" required />
        </div>
        
        <div>
          <label class="block text-xs md:text-sm font-medium text-slate-600 mb-1">儲存區域 *</label>
          <select id="inputLocation" class="w-full border border-slate-300 rounded-md p-2 md:p-2.5 text-sm md:text-base focus:ring-2 focus:ring-benq-main outline-none bg-white" required>
            <option value="" disabled selected>請先選擇儲存區域...</option>
            <option value="危險品庫房">危險品庫房</option>
            <option value="原膠室(C4)">原膠室(C4)</option>
            <option value="原膠室(P1)">原膠室(P1)</option>
          </select>
        </div>

        <div class="relative">
          <label class="block text-xs md:text-sm font-medium text-slate-600 mb-1">化學品名稱 *</label>
          <div class="relative">
            <i data-lucide="search" class="absolute left-3 top-2.5 md:top-3 w-4 h-4 text-slate-400"></i>
            <input type="text" id="chemSearchInput" placeholder="搜尋並點選化學品..." class="w-full border border-slate-300 rounded-md py-2 md:py-2.5 pl-9 pr-8 focus:ring-2 focus:ring-benq-main outline-none bg-white text-sm md:text-base" required autocomplete="off" />
            <button type="button" id="btnClearChem" class="absolute right-8 top-2.5 md:top-3 text-slate-400 hover:text-benq-main hidden">
              <i data-lucide="x" class="w-4 h-4"></i>
            </button>
            <i data-lucide="chevron-down" class="absolute right-3 top-2.5 md:top-3 w-4 h-4 text-slate-400 pointer-events-none"></i>
          </div>
          <div id="chemDropdown" class="absolute z-50 w-full mt-1 bg-white border border-slate-200 rounded-md shadow-lg max-h-48 md:max-h-60 overflow-y-auto hidden"></div>
          
          <div id="chemInfoPanel" class="mt-3 p-3 bg-purple-50/50 rounded-lg border border-purple-100 text-xs md:text-sm hidden"></div>
        </div>

        <div>
          <label class="block text-xs md:text-sm font-medium text-slate-600 mb-1">儲存量 (kg/L) *</label>
          <div class="relative">
            <input type="number" step="0.01" id="inputStorageAmt" placeholder="輸入數值" class="w-full border border-slate-300 rounded-md p-2 md:p-2.5 text-sm md:text-base focus:ring-2 focus:ring-benq-main outline-none pr-10" required />
            <button type="button" id="btnClearStorage" class="absolute right-12 top-2.5 md:top-3 text-slate-400 hover:text-benq-main hidden">
              <i data-lucide="x" class="w-4 h-4"></i>
            </button>
            <span class="absolute right-3 top-2 md:top-2.5 text-slate-400 text-xs md:text-sm pointer-events-none">kg/L</span>
          </div>
        </div>

        <div class="flex gap-2 mt-1 md:mt-2 pb-2 md:pb-0">
          <button type="submit" id="btnSubmit" class="flex-1 text-white font-medium py-2 md:py-2.5 text-sm md:text-base rounded-md transition-colors shadow-sm bg-benq-main hover:bg-benq-dark">儲存資料</button>
          <button type="button" id="btnClearForm" class="bg-slate-200 hover:bg-slate-300 text-slate-600 px-3 md:px-4 py-2 md:py-2.5 rounded-md transition-colors shadow-sm" title="清除表單重置">
            <i data-lucide="eraser" class="w-4 h-4 md:w-5 md:h-5"></i>
          </button>
        </div>
        <div id="editingBadge" class="text-xs text-amber-600 text-center -mt-2 md:-mt-3 hidden">目前處於「修改」模式</div>
      </form>
    </aside>

    <!-- 右側：資料呈現與分析區 -->
    <main class="flex-1 p-3 md:p-6 bg-slate-50 flex flex-col min-w-0">
      
      <!-- 功能列 -->
      <div class="shrink-0 bg-white p-3 md:p-4 rounded-lg shadow-sm border border-slate-200 mb-3 md:mb-4 flex flex-col xl:flex-row gap-3 xl:items-end justify-between">
        <div class="grid grid-cols-2 lg:flex lg:flex-wrap gap-3 items-end flex-1">
          <div>
            <label class="block text-[10px] md:text-xs text-slate-500 mb-1 flex items-center gap-1"><i data-lucide="calendar" class="w-3 h-3"></i>開始日期</label>
            <input type="date" id="filterStart" class="w-full border border-slate-300 rounded p-1.5 text-xs md:text-sm focus:ring-benq-main outline-none"/>
          </div>
          <div>
            <label class="block text-[10px] md:text-xs text-slate-500 mb-1 flex items-center gap-1"><i data-lucide="calendar" class="w-3 h-3"></i>結束日期</label>
            <input type="date" id="filterEnd" class="w-full border border-slate-300 rounded p-1.5 text-xs md:text-sm focus:ring-benq-main outline-none"/>
          </div>
          
          <!-- 改為多選按鈕的儲存區域篩選 -->
          <div class="relative">
            <label class="block text-[10px] md:text-xs text-slate-500 mb-1 flex items-center gap-1"><i data-lucide="map-pin" class="w-3 h-3"></i>儲存區域</label>
            <button type="button" id="btnToggleLocFilter" class="w-full border border-slate-300 rounded p-1.5 text-xs md:text-sm bg-white focus:ring-benq-main outline-none flex justify-between items-center text-left">
              <span id="locFilterBtnText" class="truncate text-slate-600">全區域</span>
              <i data-lucide="chevron-down" class="w-3 h-3 ml-1 text-slate-400 pointer-events-none shrink-0"></i>
            </button>
            <div id="locFilterDropdownPanel" class="hidden absolute z-50 w-full min-w-[120px] mt-1 bg-white border border-slate-200 rounded-md shadow-lg flex flex-col overflow-hidden">
              <div id="locCheckboxes" class="max-h-48 overflow-y-auto p-2 flex flex-col gap-1 text-xs md:text-sm"></div>
            </div>
          </div>

          <div>
            <label class="block text-[10px] md:text-xs text-slate-500 mb-1 flex items-center gap-1"><i data-lucide="layers" class="w-3 h-3"></i>類別</label>
            <select id="filterClass" class="w-full border border-slate-300 rounded p-1.5 text-xs md:text-sm bg-white focus:ring-benq-main outline-none">
              <option value="">全類別</option>
            </select>
          </div>
          <div class="col-span-2 lg:col-span-1">
            <label class="block text-[10px] md:text-xs text-slate-500 mb-1 flex items-center gap-1"><i data-lucide="filter" class="w-3 h-3"></i>化學品名稱</label>
            <div class="relative w-full lg:w-32">
              <input type="text" id="filterName" placeholder="搜尋名稱..." class="w-full border border-slate-300 rounded p-1.5 pr-6 text-xs md:text-sm focus:ring-benq-main outline-none"/>
              <button type="button" id="btnClearFilterName" class="absolute right-1.5 top-1.5 md:top-2 text-slate-400 hover:text-benq-main hidden">
                <i data-lucide="x" class="w-3 md:w-3.5 h-3 md:h-3.5"></i>
              </button>
            </div>
          </div>
        </div>
        
        <div class="flex flex-wrap gap-2 shrink-0 mt-1 xl:mt-0">
          <button id="btnClearFilters" class="flex-1 md:flex-none justify-center flex items-center gap-1 bg-slate-100 hover:bg-slate-200 text-slate-600 px-2 md:px-3 py-1.5 rounded-md text-xs md:text-sm border border-slate-300 transition-colors">
            <i data-lucide="eraser" class="w-3.5 h-3.5 md:w-4 md:h-4"></i> 清除
          </button>
          <label class="flex-1 md:flex-none justify-center cursor-pointer flex items-center gap-1 md:gap-2 bg-slate-100 hover:bg-slate-200 text-slate-700 px-2 md:px-3 py-1.5 rounded-md text-xs md:text-sm border border-slate-300 transition-colors">
            <i data-lucide="upload" class="w-3.5 h-3.5 md:w-4 md:h-4"></i> 匯入
            <input type="file" id="fileUpload" accept=".xlsx, .xls" class="hidden" />
          </label>
          <button id="btnExportExcel" class="flex-1 md:flex-none justify-center flex items-center gap-1 md:gap-2 bg-green-600 hover:bg-green-700 text-white px-2 md:px-3 py-1.5 rounded-md text-xs md:text-sm transition-colors shadow-sm">
            <i data-lucide="download" class="w-3.5 h-3.5 md:w-4 md:h-4"></i> 匯出
          </button>
          <button id="btnShareLine" class="flex-1 md:flex-none justify-center flex items-center gap-1 md:gap-2 bg-[#06C755] hover:bg-[#05b34c] text-white px-2 md:px-3 py-1.5 rounded-md text-xs md:text-sm transition-colors shadow-sm">
            <i data-lucide="share-2" class="w-3.5 h-3.5 md:w-4 md:h-4"></i> 分享
          </button>
        </div>
      </div>

      <!-- 頁籤選單 -->
      <div class="shrink-0 flex overflow-x-auto hide-scrollbar bg-white rounded-t-lg border-b border-slate-200 px-2 pt-2 gap-2 shadow-sm">
        <button id="tabSummary" class="whitespace-nowrap px-4 md:px-6 py-2 md:py-2.5 rounded-t-lg font-medium text-xs md:text-sm transition-colors flex items-center gap-2 bg-benq-main text-white shadow-sm">
          <i data-lucide="file-text" class="w-4 h-4"></i> 管制表彙整
        </button>
        <button id="tabList" class="whitespace-nowrap px-4 md:px-6 py-2 md:py-2.5 rounded-t-lg font-medium text-xs md:text-sm transition-colors flex items-center gap-2 bg-slate-100 text-slate-600 hover:bg-slate-200">
          <i data-lucide="list" class="w-4 h-4"></i> 化學品清單
        </button>
        <button id="tabChart" class="whitespace-nowrap px-4 md:px-6 py-2 md:py-2.5 rounded-t-lg font-medium text-xs md:text-sm transition-colors flex items-center gap-2 bg-slate-100 text-slate-600 hover:bg-slate-200">
          <i data-lucide="activity" class="w-4 h-4"></i> 趨勢圖表
        </button>
      </div>

      <!-- 🌟 內容區塊 -->
      <div class="bg-white border border-t-0 border-slate-200 p-3 md:p-6 rounded-b-lg shadow-sm">
        
        <!-- Sheet 1：管制表彙整 -->
        <div id="viewSummary" class="animate-in fade-in duration-300 flex flex-col gap-4">
          <div class="shrink-0 flex flex-col sm:flex-row sm:items-center justify-between gap-3 bg-purple-50 p-3 rounded-lg border border-purple-100 shadow-sm">
            <h3 class="text-base md:text-lg font-bold text-benq-dark flex items-center gap-2">
              <i data-lucide="file-text" class="w-4 h-4 md:w-5 md:h-5"></i> 管制表彙整
            </h3>
            <div class="flex items-center gap-2 w-full sm:w-auto">
              <label class="text-xs md:text-sm text-benq-dark font-medium shrink-0">盤點日：</label>
              <select id="reportDateSelect" class="w-full sm:w-auto border border-purple-300 rounded p-1.5 text-xs md:text-sm bg-white focus:ring-benq-main outline-none min-w-[120px]"></select>
            </div>
          </div>
          <div id="summaryContainer" class="flex flex-col gap-6"></div>
        </div>

        <!-- Sheet 2：化學品清單 -->
        <div id="viewList" class="animate-in fade-in duration-300 hidden flex-col">
          <div class="shrink-0 p-3 bg-purple-50 border border-purple-100 rounded-t-lg flex justify-between items-center">
            <div class="flex items-center gap-3">
              <h3 class="font-bold text-benq-dark flex items-center gap-2 text-sm md:text-base">
                <i data-lucide="list" class="w-4 h-4"></i> 化學品清單紀錄
              </h3>
              <!-- 批次刪除按鈕 -->
              <button id="btnBatchDelete" class="hidden bg-red-500 hover:bg-red-600 text-white text-xs px-3 py-1.5 rounded items-center gap-1 shadow-sm transition-colors">
                <i data-lucide="trash-2" class="w-3.5 h-3.5"></i> <span id="batchDeleteText">刪除選定項目 (0筆)</span>
              </button>
            </div>
            <span id="listCount" class="text-[10px] md:text-xs bg-purple-100 text-benq-main px-2 py-1 rounded-full"></span>
          </div>
          <div class="overflow-x-auto border border-t-0 border-slate-200 rounded-b-lg">
            <table class="w-full text-xs md:text-sm text-left break-words">
              <thead class="text-[10px] md:text-xs text-slate-600 bg-slate-50 uppercase shadow-sm">
                <tr>
                  <th class="px-3 md:px-4 py-2 md:py-3 border-b border-slate-200 text-center w-10">
                    <input type="checkbox" id="selectAllList" class="w-4 h-4 text-benq-main rounded border-slate-300 focus:ring-benq-main cursor-pointer">
                  </th>
                  <th class="px-3 md:px-4 py-2 md:py-3 border-b border-slate-200 whitespace-nowrap cursor-pointer hover:bg-slate-200 sort-icon" onclick="handleSort('date')" id="sort-date">盤點日期</th>
                  <th class="px-3 md:px-4 py-2 md:py-3 border-b border-slate-200 whitespace-nowrap cursor-pointer hover:bg-slate-200 sort-icon" onclick="handleSort('location')" id="sort-location">儲存場所</th>
                  <th class="px-3 md:px-4 py-2 md:py-3 border-b border-slate-200 whitespace-nowrap cursor-pointer hover:bg-slate-200 sort-icon" onclick="handleSort('category')" id="sort-category">標示版歸類</th>
                  <th class="px-3 md:px-4 py-2 md:py-3 border-b border-slate-200 whitespace-nowrap cursor-pointer hover:bg-slate-200 sort-icon" onclick="handleSort('petroleumClass')" id="sort-petroleumClass">類別</th>
                  <th class="px-3 md:px-4 py-2 md:py-3 border-b border-slate-200 min-w-[120px] cursor-pointer hover:bg-slate-200 sort-icon" onclick="handleSort('chemName')" id="sort-chemName">化學品名稱</th>
                  <th class="px-3 md:px-4 py-2 md:py-3 border-b border-slate-200 text-right whitespace-nowrap cursor-pointer hover:bg-slate-200 sort-icon" onclick="handleSort('storageAmt')" id="sort-storageAmt">儲存量</th>
                  <th class="px-3 md:px-4 py-2 md:py-3 border-b border-slate-200 text-right whitespace-nowrap">管制量</th>
                  <th class="px-3 md:px-4 py-2 md:py-3 border-b border-slate-200 text-center whitespace-nowrap cursor-pointer hover:bg-slate-200 sort-icon" onclick="handleSort('multiple')" id="sort-multiple">倍數</th>
                  <th class="px-3 md:px-4 py-2 md:py-3 border-b border-slate-200 text-center font-bold w-16 md:w-24">操作</th>
                </tr>
              </thead>
              <tbody id="listBody"></tbody>
            </table>
          </div>
        </div>

        <!-- Sheet 3：趨勢圖表 -->
        <div id="viewChart" class="animate-in fade-in duration-300 hidden flex-col min-h-[400px]">
          <h3 class="shrink-0 text-base md:text-lg font-semibold text-benq-dark mb-3 md:mb-4 flex items-center gap-2">
            <i data-lucide="activity" class="w-4 h-4 text-benq-main"></i> 儲存量變化趨勢圖 (依化學品)
          </h3>
          
          <div class="mb-4 shrink-0 relative" id="chartChemDropdownContainer">
            <label class="block text-xs md:text-sm font-bold mb-2 text-slate-700">選擇化學品 (請點擊展開並勾選)：</label>
            
            <!-- 展開/收合按鈕 -->
            <button type="button" id="btnToggleChartChem" class="w-full flex justify-between items-center border border-slate-300 p-2.5 rounded-lg bg-white text-sm focus:ring-2 focus:ring-benq-main outline-none shadow-sm transition-colors hover:bg-slate-50">
              <span id="chartChemBtnText" class="truncate text-slate-500">請展開勾選欲顯示的項目...</span>
              <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400 pointer-events-none"></i>
            </button>
            
            <!-- 下拉選單面板 -->
            <div id="chartChemDropdownPanel" class="hidden absolute z-50 w-full mt-1 bg-white border border-slate-200 rounded-lg shadow-xl flex flex-col overflow-hidden">
              <div class="p-2 border-b border-slate-100 flex gap-2 bg-slate-50 shrink-0">
                <button type="button" id="btnSelectAllChems" class="text-xs bg-white border border-slate-300 hover:bg-slate-100 text-slate-700 px-4 py-1.5 rounded transition-colors font-medium shadow-sm flex-1">全選</button>
                <button type="button" id="btnClearAllChems" class="text-xs bg-white border border-slate-300 hover:bg-slate-100 text-slate-700 px-4 py-1.5 rounded transition-colors font-medium shadow-sm flex-1">清除全部</button>
              </div>
              <div id="multiChemCheckboxes" class="max-h-64 overflow-y-auto p-3 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 content-start text-sm">
                <!-- 動態產生的 Checkbox 列表 -->
              </div>
            </div>
          </div>

          <div class="flex-1 w-full relative min-h-[300px] md:min-h-[400px]">
            <div id="chartNoData" class="absolute inset-0 flex items-center justify-center bg-white/80 z-10 text-slate-500 text-sm hidden">尚無符合條件的資料或未選取化學品</div>
            <canvas id="myChart"></canvas>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script>
    // --- 初始設定與資料 ---
    // 最新化學品資料庫

      document.querySelectorAll('.chem-checkbox').forEach(cb => {
        cb.addEventListener('change', renderChart);
      });

    function updateFilterDropdowns() {
      const locs = [...new Set(state.chemicals.map(c => c.location))];
      const petros = [...new Set(state.chemicals.map(c => c.petroleumClass))];
      
      // 繪製區域複選 Checkboxes
      DOM.locCheckboxes.innerHTML = locs.map(l => `
        <label class="flex items-center gap-2 cursor-pointer hover:bg-slate-100 p-1.5 rounded transition-colors">
          <input type="checkbox" value="${l}" class="loc-checkbox w-4 h-4 text-benq-main rounded border-slate-300 focus:ring-benq-main" ${state.filters.locations.includes(l) ? 'checked' : ''}>
          <span class="truncate text-slate-700">${l}</span>
        </label>
      `).join('');

      document.querySelectorAll('.loc-checkbox').forEach(cb => {
        cb.addEventListener('change', window.applyFilters);
      });

      DOM.filterClass.innerHTML = '<option value="">全類別</option>' + petros.map(p => `<option value="${p}">${p}</option>`).join('');
      DOM.filterClass.value = state.filters.petroleumClass;
    }

    function processData() {
      const fullData = state.inventoryData.map(record => {
        const c = state.chemicals.find(x => x.id === record.chemId) || {};
        return {
          ...record,
          chemName: c.name || '未知化學品',
          location: c.location || '未知場所',
          category: c.category || '未分類',
          petroleumClass: c.petroleumClass || '未分類',
          flashPoint: c.flashPoint || '',
          controlAmt: c.controlAmt || 1,
          multiple: c.controlAmt ? parseFloat((record.storageAmt / c.controlAmt).toFixed(2)) : 0
        };
      });

      state.filteredData = fullData.filter(record => {
        let pass = true;
        if (state.filters.startDate) pass = pass && new Date(record.date) >= new Date(state.filters.startDate);
        if (state.filters.endDate) pass = pass && new Date(record.date) <= new Date(state.filters.endDate);
        if (state.filters.chemName) pass = pass && record.chemName.toLowerCase().includes(state.filters.chemName.toLowerCase());
        
        // 陣列包含判斷
        if (state.filters.locations && state.filters.locations.length > 0) {
          pass = pass && state.filters.locations.includes(record.location);
        }
        
        if (state.filters.petroleumClass) pass = pass && record.petroleumClass === state.filters.petroleumClass;
        return pass;
      });

      const availableDates = [...new Set(state.filteredData.map(d => d.date))].sort((a,b)=> new Date(b) - new Date(a));
      DOM.reportDateSelect.innerHTML = availableDates.length > 0 
        ? availableDates.map(d => `<option value="${d}">${d}</option>`).join('')
        : `<option value="">無資料</option>`;
      
      if (availableDates.length > 0 && !availableDates.includes(state.selectedReportDate)) {
        state.selectedReportDate = availableDates[0];
      } else if (availableDates.length === 0) {
        state.selectedReportDate = '';
      }
      DOM.reportDateSelect.value = state.selectedReportDate;

      renderApp();
    }

        } else {
          btn.className = 'whitespace-nowrap px-4 md:px-6 py-2 md:py-2.5 rounded-t-lg font-medium text-xs md:text-sm transition-colors flex items-center gap-2 bg-slate-100 text-slate-600 hover:bg-slate-200';
          view.classList.add('hidden');
        }
      });
    }

    // --- 管制表彙整 ---
    function renderSummary() {
      // 管制表只吃時間、名稱、類別過濾
      const baseDataForSummary = state.inventoryData.map(record => {
        const c = state.chemicals.find(x => x.id === record.chemId) || {};
        return {
          ...record,
          chemName: c.name || '未知化學品',
          location: c.location || '未知場所',
          category: c.category || '未分類',
          petroleumClass: c.petroleumClass || '未分類',
          controlAmt: c.controlAmt || 1
        };
      }).filter(d => {
         let pass = (d.date === state.selectedReportDate);
         if (state.filters.chemName && !d.chemName.toLowerCase().includes(state.filters.chemName.toLowerCase())) pass = false;
         if (state.filters.petroleumClass && d.petroleumClass !== state.filters.petroleumClass) pass = false;
         return pass;
      });

      let html = '';

      // 動態決定要渲染的區塊與資料過濾條件
      let renderGroups = [];
      const locs = state.filters.locations || [];

      if (locs.length === 0) {
        renderGroups.push({ title: '危險品庫房', dataFilter: d => d.location === '危險品庫房', ruleKey: '危險品庫房' });
        renderGroups.push({ title: '原膠室(C4+P1)', dataFilter: d => d.location.includes('原膠室'), ruleKey: '原膠室(C4+P1)' });
      } else {
        if (locs.includes('危險品庫房')) {
          renderGroups.push({ title: '危險品庫房', dataFilter: d => d.location === '危險品庫房', ruleKey: '危險品庫房' });
        }
        
        const hasC4 = locs.includes('原膠室(C4)');
        const hasP1 = locs.includes('原膠室(P1)');

        if (hasC4 && hasP1) {
          renderGroups.push({ title: '原膠室(C4+P1)', dataFilter: d => d.location.includes('原膠室'), ruleKey: '原膠室(C4+P1)' });
        } else if (hasC4) {
          renderGroups.push({ title: '原膠室(C4)', dataFilter: d => d.location === '原膠室(C4)', ruleKey: '原膠室(C4+P1)' });
        } else if (hasP1) {
          renderGroups.push({ title: '原膠室(P1)', dataFilter: d => d.location === '原膠室(P1)', ruleKey: '原膠室(C4+P1)' });
        }
      }

      renderGroups.forEach(group => {
        const locData = baseDataForSummary.filter(group.dataFilter);

        const rules = applicationRules[group.ruleKey] || [];
        const groupedRules = {};
        
        rules.forEach(r => {
          if (!groupedRules[r.petroleumClass]) groupedRules[r.petroleumClass] = [];
          groupedRules[r.petroleumClass].push(r);
        });

        const leftoverItems = locData.filter(d => !rules.some(r => r.category === d.category && r.petroleumClass === d.petroleumClass));
        leftoverItems.forEach(item => {
          const pClass = item.petroleumClass || '未分類';
          if (!groupedRules[pClass]) groupedRules[pClass] = [];
          if (!groupedRules[pClass].some(r => r.category === item.category && r.isLeftover)) {
            groupedRules[pClass].push({ category: item.category, petroleumClass: pClass, controlAmt: item.controlAmt || 1, applyAmt: 0, applyMultiple: 0, isLeftover: true });
          }
        });

        if (Object.keys(groupedRules).length === 0) return;

        let totalRowsCount = 0;
        let locTotalActualMultiple = 0, locTotalApplyMultiple = 0, locTotalStorageAmt = 0;

        Object.keys(groupedRules).forEach(pClass => {
          totalRowsCount += groupedRules[pClass].length;
          groupedRules[pClass].forEach(rule => {
            const items = locData.filter(d => d.category === rule.category && d.petroleumClass === pClass);
            const actualStorage = items.reduce((sum, i) => sum + i.storageAmt, 0);
            locTotalActualMultiple += actualStorage / rule.controlAmt;
            locTotalApplyMultiple += rule.applyMultiple;
            locTotalStorageAmt += actualStorage;
          });
        });

        if (totalRowsCount === 0) totalRowsCount = 1;
        const isLocPass = locTotalActualMultiple <= locTotalApplyMultiple;
        const headerColor = group.ruleKey === '危險品庫房' ? 'bg-red-50 border-red-200 text-red-900' : 'bg-purple-50 border-purple-200 text-benq-dark';

        html += `
          <div class="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden flex flex-col shrink-0">
            <div class="p-3 border-b flex flex-col md:flex-row gap-3 justify-between items-center ${headerColor}">
              <h3 class="font-bold flex items-center gap-2 text-base md:text-lg">
                <i data-lucide="map-pin" class="w-4 h-4 md:w-5 md:h-5"></i> ${group.title}
              </h3>
              <div class="flex items-center gap-2 md:gap-4 text-xs md:text-sm bg-white/70 px-3 md:px-4 py-2 rounded-md border shadow-sm border-slate-200/50 flex-wrap sm:flex-nowrap">
                <div class="flex items-center gap-1 md:gap-2">
                  <span class="text-slate-500 font-medium">實際總量:</span>
                  <span class="font-bold text-benq-main text-sm md:text-base">${locTotalStorageAmt > 0 ? locTotalStorageAmt.toFixed(2) : '0.00'}</span> 
                  <span class="text-slate-400">kg/L</span>
                </div>
                <div class="w-px h-6 bg-slate-300 hidden sm:block"></div>
                <div class="flex items-center gap-1 md:gap-2">
                  <span class="text-slate-500 font-medium">總倍數:</span>
                  <span class="font-bold text-benq-main text-sm md:text-base">${locTotalActualMultiple > 0 ? locTotalActualMultiple.toFixed(2) : '0.00'}</span>
                </div>
                <div class="w-px h-6 bg-slate-300 hidden sm:block"></div>
                <div class="font-bold px-2 py-1 rounded w-full sm:w-auto text-center ${isLocPass ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                  ${isLocPass ? '✅ 總量符合' : '❌ 總量超標'}
                </div>
              </div>
            </div>
            <div class="overflow-x-auto">
              <table class="w-full text-xs md:text-sm text-left border-collapse break-words min-w-[800px]">
                <thead class="text-[10px] md:text-xs text-slate-700 bg-slate-100 border-b-2 border-slate-300 text-center">
                  <tr>
                    <th rowspan="2" class="px-2 md:px-3 py-2 md:py-3 border border-slate-200 align-middle bg-slate-200/50 w-20 md:w-24">危物種類</th>
                    <th colspan="5" class="px-2 md:px-3 py-1.5 md:py-2 border border-slate-200 bg-purple-100/60 text-benq-dark tracking-wide">${group.ruleKey} 合法申請量</th>
                    <th colspan="3" class="px-2 md:px-3 py-1.5 md:py-2 border border-slate-200 bg-amber-100/60">實際儲存量及符合度</th>
                    <th rowspan="2" class="px-2 md:px-3 py-2 md:py-3 border border-slate-200 align-middle bg-emerald-100/60 w-24 md:w-32">種類符合度</th>
                  </tr>
                  <tr>
                    <th class="px-2 md:px-3 py-1.5 md:py-2 border border-slate-200 bg-purple-50 w-24 md:w-28">標示版分類</th>
                    <th class="px-2 md:px-3 py-1.5 md:py-2 border border-slate-200 bg-purple-50 w-20 md:w-24">申請量</th>
                    <th class="px-2 md:px-3 py-1.5 md:py-2 border border-slate-200 bg-purple-50 w-20 md:w-24">量加總</th>
                    <th class="px-2 md:px-3 py-1.5 md:py-2 border border-slate-200 bg-purple-50 w-16 md:w-20">倍數</th>
                    <th class="px-2 md:px-3 py-1.5 md:py-2 border border-slate-200 bg-purple-50 w-16 md:w-20">倍加總</th>
                    <th class="px-2 md:px-3 py-1.5 md:py-2 border border-slate-200 bg-amber-50 w-20 md:w-24">實際量</th>
                    <th class="px-2 md:px-3 py-1.5 md:py-2 border border-slate-200 bg-amber-50 w-20 md:w-24">超標量</th>
                    <th class="px-2 md:px-3 py-1.5 md:py-2 border border-slate-200 bg-amber-50 w-20 md:w-24">符合度</th>
                  </tr>
                </thead>
                <tbody>
        `;

        Object.keys(groupedRules).forEach((pClass, pIdx) => {
          const classRules = groupedRules[pClass];
          const classRowSpan = classRules.length;
          
          let classApplySum = 0, classApplyMultSum = 0, classActualMultipleSum = 0;
          classRules.forEach(r => {
            classApplySum += r.applyAmt; classApplyMultSum += r.applyMultiple;
            const items = locData.filter(d => d.category === r.category && d.petroleumClass === pClass);
            classActualMultipleSum += items.reduce((sum, i) => sum + i.storageAmt, 0) / r.controlAmt;
          });
          const classIsPass = classActualMultipleSum <= classApplyMultSum;

          classRules.forEach((rule, rIdx) => {
            const items = locData.filter(d => d.category === rule.category && d.petroleumClass === pClass);
            const actualStorage = items.reduce((sum, i) => sum + i.storageAmt, 0);
            const actualMultiple = actualStorage / rule.controlAmt;
            const excessAmt = actualStorage > rule.applyAmt ? actualStorage - rule.applyAmt : 0;
            const isPass = rule.isLeftover ? false : actualMultiple <= rule.applyMultiple;

            const trClass = rule.isLeftover ? "bg-red-50/40" : "hover:bg-slate-50/80";
            
            html += `<tr class="${trClass}">`;
            
            if (rIdx === 0) {
              html += `<td rowspan="${classRowSpan}" class="px-2 md:px-3 py-2 md:py-3 border border-slate-200 font-bold text-center align-middle bg-slate-50/50">${pClass}</td>`;
            }
            
            html += `<td class="px-2 md:px-3 py-2 md:py-3 border border-slate-200 font-medium text-slate-800 text-center">${rule.label || rule.category} ${rule.isLeftover ? '<span class="text-red-500 text-[10px] md:text-xs block">(無申請)</span>' : ''}</td>`;
            html += `<td class="px-2 md:px-3 py-2 md:py-3 border border-slate-200 text-right text-slate-600">${rule.applyAmt.toFixed(2)}</td>`;
            
            if (rIdx === 0) html += `<td rowspan="${classRowSpan}" class="px-2 md:px-3 py-2 md:py-3 border border-slate-200 text-center align-middle bg-purple-50/40 font-bold text-benq-main text-sm md:text-base">${classApplySum.toFixed(2)}</td>`;
            html += `<td class="px-2 md:px-3 py-2 md:py-3 border border-slate-200 text-right text-slate-600">${rule.applyMultiple.toFixed(2)}</td>`;
            if (rIdx === 0) html += `<td rowspan="${classRowSpan}" class="px-2 md:px-3 py-2 md:py-3 border border-slate-200 text-center align-middle bg-purple-50/40 font-bold text-benq-main text-sm md:text-base">${classApplyMultSum.toFixed(2)}</td>`;

            html += `<td class="px-2 md:px-3 py-2 md:py-3 border border-slate-200 text-right text-benq-main font-bold">${actualStorage > 0 ? actualStorage.toFixed(2) : '-'}</td>`;
            html += `<td class="px-2 md:px-3 py-2 md:py-3 border border-slate-200 text-right font-medium ${excessAmt > 0 ? 'text-red-600' : 'text-slate-400'}">${excessAmt > 0 ? excessAmt.toFixed(2) : '-'}</td>`;
            html += `<td class="px-2 md:px-3 py-2 md:py-3 border border-slate-200 text-center"><span class="px-2 py-1 rounded text-[10px] md:text-xs font-bold whitespace-nowrap ${isPass ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${isPass ? '符合' : '不符'}</span></td>`;

            if (rIdx === 0) {
              html += `
                <td rowspan="${classRowSpan}" class="px-2 md:px-3 py-2 md:py-3 border border-slate-200 text-center align-middle bg-slate-50">
                  <div class="flex flex-col items-center justify-center gap-1.5">
                    <span class="text-[10px] md:text-xs text-slate-500 font-medium mt-1">實際倍數</span>
                    <span class="text-sm md:text-base font-bold ${classIsPass ? 'text-benq-main' : 'text-red-600'}">${classActualMultipleSum.toFixed(2)}</span>
                    <span class="px-2 py-1 rounded text-[10px] md:text-xs font-bold whitespace-nowrap mt-0.5 ${classIsPass ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                      ${classIsPass ? '✅ 符合' : '❌ 超標'}
                    </span>
                  </div>
                </td>
              `;
            }
            html += `</tr>`;
          });
        });

        html += `</tbody></table></div></div>`;
      });
      
      DOM.summaryContainer.innerHTML = html || '<div class="text-center text-slate-400 py-8">查無資料</div>';
    }

    // --- 點擊標題排序 ---
    window.handleSort = function(key) {
      if (state.sortConfig.key === key) {
        state.sortConfig.direction *= -1;
      } else {
        state.sortConfig.key = key;
        state.sortConfig.direction = 1;
      }
      
      document.querySelectorAll('.sort-icon').forEach(el => {
        el.classList.remove('sort-asc', 'sort-desc');
      });
      const th = document.getElementById(`sort-${key}`);
      if (th) {
        th.classList.add(state.sortConfig.direction === 1 ? 'sort-asc' : 'sort-desc');
      }

      renderList();
      lucide.createIcons();
    };

    // --- 渲染 化學品清單 ---
    function renderList() {
      DOM.listCount.innerText = `共 ${state.filteredData.length} 筆明細`;

      let displayData = [...state.filteredData];
      
      if (state.sortConfig.key) {
        displayData.sort((a, b) => {
          let valA = a[state.sortConfig.key];
          let valB = b[state.sortConfig.key];
          if (typeof valA === 'string') return valA.localeCompare(valB) * state.sortConfig.direction;
          return (valA > valB ? 1 : -1) * state.sortConfig.direction;
        });
      } else {
        displayData.sort((a, b) => b.createdAt - a.createdAt);
      }

      if (displayData.length === 0) {
        DOM.listBody.innerHTML = `<tr><td colspan="10" class="px-4 py-8 text-center text-slate-400">尚無符合條件的清單資料</td></tr>`;
        updateBatchDeleteUI();
        return;
      }
      
      DOM.listBody.innerHTML = displayData.map(row => {
        const isChecked = state.selectedRecordIds.has(row.id) ? 'checked' : '';
        return `
        <tr class="bg-white border-b border-slate-100 hover:bg-slate-50 transition-colors ${isChecked ? 'bg-purple-50/30' : ''}">
          <td class="px-3 md:px-4 py-2 md:py-2.5 text-center">
            <input type="checkbox" value="${row.id}" class="row-checkbox w-4 h-4 text-benq-main rounded border-slate-300 focus:ring-benq-main cursor-pointer" ${isChecked}>
          </td>
          <td class="px-3 md:px-4 py-2 md:py-2.5 whitespace-nowrap text-slate-600">${row.date}</td>
          <td class="px-3 md:px-4 py-2 md:py-2.5 text-slate-700 whitespace-nowrap">${row.location}</td>
          <td class="px-3 md:px-4 py-2 md:py-2.5 text-slate-700 whitespace-nowrap">${row.category}</td>
          <td class="px-3 md:px-4 py-2 md:py-2.5 text-amber-700 bg-amber-50/30 font-medium whitespace-nowrap">${row.petroleumClass}</td>
          <td class="px-3 md:px-4 py-2 md:py-2.5 font-medium text-slate-800 min-w-[120px]">${row.chemName}</td>
          <td class="px-3 md:px-4 py-2 md:py-2.5 text-right text-slate-700 font-semibold">${Number(row.storageAmt).toFixed(2)}</td>
          <td class="px-3 md:px-4 py-2 md:py-2.5 text-right text-slate-500">${Number(row.controlAmt).toFixed(2)}</td>
          <td class="px-3 md:px-4 py-2 md:py-2.5 text-center">
            <span class="px-2 py-1 rounded text-[10px] md:text-xs font-semibold ${row.multiple >= 1 ? 'bg-red-100 text-red-700' : 'bg-slate-100 text-slate-600'}">${row.multiple}</span>
          </td>
          <td class="px-3 md:px-4 py-2 md:py-2.5 text-center">
            <div class="flex items-center justify-center gap-2 md:gap-3">
              <button onclick="handleEdit('${row.id}')" class="text-blue-600 hover:text-blue-800 transition-colors p-1"><i data-lucide="edit" class="w-4 h-4"></i></button>
              <button onclick="handleDelete('${row.id}')" class="text-red-500 hover:text-red-700 transition-colors p-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
            </div>
          </td>
        </tr>
      `}).join('');

      document.querySelectorAll('.row-checkbox').forEach(cb => {
        cb.addEventListener('change', (e) => {
          if (e.target.checked) {
            state.selectedRecordIds.add(e.target.value);
            e.target.closest('tr').classList.add('bg-purple-50/30');
          } else {
            state.selectedRecordIds.delete(e.target.value);
            e.target.closest('tr').classList.remove('bg-purple-50/30');
          }
          updateBatchDeleteUI();
        });
      });

      updateBatchDeleteUI();
    }

    function updateBatchDeleteUI() {
      if (!DOM.btnBatchDelete || !DOM.batchDeleteText || !DOM.selectAllList) return;

      const visibleIds = state.filteredData.map(r => r.id);
      const isAllVisibleSelected = visibleIds.length > 0 && visibleIds.every(id => state.selectedRecordIds.has(id));
      
      DOM.selectAllList.checked = isAllVisibleSelected;
      DOM.selectAllList.disabled = visibleIds.length === 0;

      if (state.selectedRecordIds.size > 0) {
        DOM.btnBatchDelete.classList.remove('hidden');
        DOM.btnBatchDelete.classList.add('flex');
        DOM.batchDeleteText.innerText = `刪除選定項目 (${state.selectedRecordIds.size}筆)`;
      } else {
        DOM.btnBatchDelete.classList.add('hidden');
        DOM.btnBatchDelete.classList.remove('flex');
      }
    }

    // --- 渲染 圖表 ---
    function renderChart() {
      if (!window.Chart) return;
      const canvas = document.getElementById('myChart');
      if (state.filteredData.length === 0) {
        DOM.chartNoData.classList.remove('hidden');
        if (state.chartInstance) { state.chartInstance.destroy(); state.chartInstance = null; }
        return;
      }

      const selectedChems = Array.from(document.querySelectorAll('.chem-checkbox:checked')).map(cb => cb.value);
      
      if (DOM.chartChemBtnText) {
        if (selectedChems.length === 0) {
          DOM.chartChemBtnText.innerText = '請展開勾選欲顯示的項目...';
          DOM.chartChemBtnText.className = 'truncate text-slate-500';
        } else {
          DOM.chartChemBtnText.innerText = `已選擇 ${selectedChems.length} 項化學品`;
          DOM.chartChemBtnText.className = 'truncate text-benq-main font-bold';
        }
      }

      if(selectedChems.length === 0) {
        DOM.chartNoData.innerText = "請由上方展開選單並勾選化學品以顯示圖表";
        DOM.chartNoData.classList.remove('hidden');
        if (state.chartInstance) { state.chartInstance.destroy(); state.chartInstance = null; }
        return;
      }
      
      DOM.chartNoData.classList.add('hidden');

      const dates = [...new Set(state.filteredData.map(d => d.date))].sort((a, b) => new Date(a) - new Date(b));

      const datasets = selectedChems.map((chemName, index) => {
        const dataPoints = dates.map(date => {
          const record = state.filteredData.find(d => d.date === date && d.chemName === chemName);
          return record ? record.storageAmt : null;
        });
        
        const hue = (index * 360) / selectedChems.length;
        const color = `hsl(${hue}, 70%, 50%)`;
        const bgColor = `hsla(${hue}, 70%, 50%, 0.1)`;

        return {
          label: chemName, data: dataPoints,
          borderColor: color, backgroundColor: bgColor,
          tension: 0.3, spanGaps: true, pointRadius: 4, borderWidth: 2, fill: true
        };
      });

      if (state.chartInstance) state.chartInstance.destroy();
      state.chartInstance = new Chart(canvas, {
        type: 'line', data: { labels: dates, datasets: datasets },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { position: 'top' }, tooltip: { callbacks: { label: c => `${c.dataset.label}: ${c.parsed.y} kg/L` } } },
          scales: { y: { beginAtZero: true, title: { display: true, text: '儲存量 (L)' } }, x: { title: { display: false } } }
        }
      });
    }

    // --- 表單與下拉選單邏輯 ---
    function updateDropdown() {
      const loc = DOM.inputLocation.value;
      if (!loc) {
        DOM.chemDropdown.innerHTML = `<div class="px-4 py-3 text-sm text-amber-600 text-center font-medium">請先選擇上方的「儲存區域」</div>`;
        return;
      }

      const searchStr = DOM.chemSearchInput.value.toLowerCase();
      const filtered = state.chemicals.filter(c => c.location === loc && (c.name.toLowerCase().includes(searchStr) || c.category.includes(searchStr)));
      
      if (searchStr) DOM.btnClearChem.classList.remove('hidden');
      else DOM.btnClearChem.classList.add('hidden');

      if (filtered.length === 0) {
        DOM.chemDropdown.innerHTML = `<div class="px-4 py-3 text-sm text-slate-500 text-center">該區域查無符合的化學品</div>`;
      } else {
        DOM.chemDropdown.innerHTML = filtered.map(c => `
          <div onclick="selectChem('${c.id}', '${c.name}')" class="px-4 py-2 hover:bg-purple-50 cursor-pointer border-b border-slate-100 last:border-0">
            <div class="font-medium text-slate-800">${c.name}</div>
            <div class="text-xs text-slate-500 flex justify-between mt-0.5"><span>${c.category}</span><span>${c.petroleumClass}</span></div>
          </div>
        `).join('');
      }
    }

    window.selectChem = function(id, name) {
      state.formData.chemId = id;
      DOM.chemSearchInput.value = name;
      DOM.chemDropdown.classList.add('hidden');
      updateChemInfoPanel();
    };

    function updateChemInfoPanel() {
      const chem = state.chemicals.find(c => c.id === state.formData.chemId);
      if (!chem) { DOM.chemInfoPanel.classList.add('hidden'); return; }

      let appliedInfo = '無對應申請量';
      const ruleLocGroup = chem.location.includes('原膠室') ? '原膠室(C4+P1)' : chem.location;
      const rules = applicationRules[ruleLocGroup] || [];
      const rule = rules.find(r => r.category === chem.category && r.petroleumClass === chem.petroleumClass);
      if (rule) appliedInfo = `${rule.applyAmt} L (${rule.applyMultiple} 倍)`;

      DOM.chemInfoPanel.innerHTML = `
        <h4 class="font-bold text-benq-dark mb-2 border-b border-purple-200 pb-1">「${ruleLocGroup}」合法申請資訊</h4>
        <div class="grid grid-cols-1 gap-1.5 text-slate-700">
          <div class="flex justify-between"><span class="text-slate-500">合法申請量</span> <span class="font-bold text-benq-main">${appliedInfo}</span></div>
          <div class="flex justify-between"><span class="text-slate-500">管制量基準</span> <span class="font-medium">${chem.controlAmt} L</span></div>
          <div class="flex justify-between"><span class="text-slate-500">類別</span> <span class="font-medium text-amber-700">${chem.petroleumClass}</span></div>
          <div class="flex justify-between"><span class="text-slate-500">標示版分類</span> <span class="font-medium">${chem.category}</span></div>
          <div class="flex justify-between"><span class="text-slate-500">閃火點</span> <span class="font-medium">${chem.flashPoint ? chem.flashPoint+' °C' : '無紀錄'}</span></div>
        </div>
      `;
      DOM.chemInfoPanel.classList.remove('hidden');
    }

    window.handleEdit = function(id) {
      const record = state.inventoryData.find(r => r.id === id);
      if(!record) return;
      state.editingId = id;
      state.formData = { date: record.date, chemId: record.chemId, storageAmt: record.storageAmt };
      DOM.inputDate.value = record.date;
      DOM.inputStorageAmt.value = record.storageAmt;
      const c = state.chemicals.find(x => x.id === record.chemId);
      if (c) {
        DOM.inputLocation.value = c.location;
        DOM.chemSearchInput.value = c.name;
        updateChemInfoPanel();
      }
      DOM.btnSubmit.innerText = '儲存修改';
      DOM.btnSubmit.classList.replace('bg-benq-main', 'bg-amber-600');
      DOM.btnSubmit.classList.replace('hover:bg-benq-dark', 'hover:bg-amber-700');
      DOM.editingBadge.classList.remove('hidden');
    };

    window.handleDelete = function(id) {
      if (confirm('確定要刪除這筆庫存紀錄嗎？這將無法復原。')) {
        state.inventoryData = state.inventoryData.filter(r => r.id !== id);
        saveDataToStorage();
        processData();
      }
    };

    // --- 事件綁定 ---
    function attachEventListeners() {
      DOM.tabs.summary.addEventListener('click', () => { state.activeTab = 'summary'; renderApp(); });
      DOM.tabs.list.addEventListener('click', () => { state.activeTab = 'list'; renderApp(); });
      DOM.tabs.chart.addEventListener('click', () => { state.activeTab = 'chart'; renderApp(); });

      if (DOM.selectAllList) {
        DOM.selectAllList.addEventListener('change', (e) => {
          const isChecked = e.target.checked;
          state.filteredData.forEach(row => {
            if (isChecked) state.selectedRecordIds.add(row.id);
            else state.selectedRecordIds.delete(row.id);
          });
          renderList();
          lucide.createIcons();
        });
      }

      if (DOM.btnBatchDelete) {
        DOM.btnBatchDelete.addEventListener('click', () => {
          if (confirm(`確定要刪除選定的 ${state.selectedRecordIds.size} 筆庫存紀錄嗎？\n(此操作無法復原)`)) {
            state.inventoryData = state.inventoryData.filter(r => !state.selectedRecordIds.has(r.id));
            state.selectedRecordIds.clear();
            saveDataToStorage();
            processData(); 
          }
        });
      }

      // 儲存區域複選下拉單
      if (DOM.btnToggleLocFilter) {
        DOM.btnToggleLocFilter.addEventListener('click', (e) => {
          e.stopPropagation();
          DOM.locFilterDropdownPanel.classList.toggle('hidden');
        });
      }

      // 圖表下拉單
      if (DOM.btnToggleChartChem) {
        DOM.btnToggleChartChem.addEventListener('click', (e) => {
          e.stopPropagation();
          DOM.chartChemDropdownPanel.classList.toggle('hidden');
        });
      }

      document.addEventListener('mousedown', (e) => {
        if (DOM.locFilterDropdownPanel && !DOM.btnToggleLocFilter.contains(e.target) && !DOM.locFilterDropdownPanel.contains(e.target)) {
          DOM.locFilterDropdownPanel.classList.add('hidden');
        }
        if (DOM.chartChemDropdownContainer && !DOM.chartChemDropdownContainer.contains(e.target)) {
          DOM.chartChemDropdownPanel.classList.add('hidden');
        }
      });

      if (DOM.btnSelectAllChems) {
        DOM.btnSelectAllChems.addEventListener('click', () => {
          document.querySelectorAll('.chem-checkbox').forEach(cb => cb.checked = true);
          renderChart();
        });
      }
      if (DOM.btnClearAllChems) {
        DOM.btnClearAllChems.addEventListener('click', () => {
          document.querySelectorAll('.chem-checkbox').forEach(cb => cb.checked = false);
          renderChart();
        });
      }

      DOM.inputLocation.addEventListener('change', () => {
        DOM.chemSearchInput.value = '';
        state.formData.chemId = '';
        DOM.chemInfoPanel.classList.add('hidden');
        DOM.chemDropdown.classList.remove('hidden');
        updateDropdown();
      });

      DOM.chemSearchInput.addEventListener('focus', () => { 
        if(!DOM.inputLocation.value) {
          alert('請先選擇上方的「儲存區域」');
          DOM.inputLocation.focus();
          return;
        }
        DOM.chemDropdown.classList.remove('hidden'); 
        updateDropdown(); 
      });
      DOM.chemSearchInput.addEventListener('input', () => { state.formData.chemId = ''; DOM.chemInfoPanel.classList.add('hidden'); updateDropdown(); });
      DOM.btnClearChem.addEventListener('click', () => { DOM.chemSearchInput.value = ''; state.formData.chemId = ''; DOM.chemDropdown.classList.add('hidden'); DOM.btnClearChem.classList.add('hidden'); DOM.chemInfoPanel.classList.add('hidden'); });
      
      DOM.inputStorageAmt.addEventListener('input', () => {
        if (DOM.inputStorageAmt.value) DOM.btnClearStorage.classList.remove('hidden');
        else DOM.btnClearStorage.classList.add('hidden');
      });
      DOM.btnClearStorage.addEventListener('click', () => { DOM.inputStorageAmt.value = ''; DOM.btnClearStorage.classList.add('hidden'); });

      DOM.btnClearForm.addEventListener('click', () => {
        state.formData = { date: todayStr, chemId: '', storageAmt: '' };
        state.editingId = null;
        DOM.inputDate.value = todayStr;
        DOM.inputLocation.value = '';
        DOM.chemSearchInput.value = '';
        DOM.inputStorageAmt.value = '';
        DOM.chemInfoPanel.classList.add('hidden');
        DOM.btnClearChem.classList.add('hidden');
        DOM.btnClearStorage.classList.add('hidden');
        DOM.btnSubmit.innerText = '儲存資料';
        DOM.btnSubmit.classList.replace('bg-amber-600', 'bg-benq-main');
        DOM.btnSubmit.classList.replace('hover:bg-amber-700', 'hover:bg-benq-dark');
        DOM.editingBadge.classList.add('hidden');
      });

      document.getElementById('inputForm').addEventListener('submit', (e) => {
        e.preventDefault();
        state.formData.date = DOM.inputDate.value;
        state.formData.storageAmt = DOM.inputStorageAmt.value;
        
        if (!DOM.inputLocation.value || !state.formData.date || !state.formData.chemId || !state.formData.storageAmt) {
          return alert('請填寫完整資料 (請先選擇區域與化學品)');
        }

        const chem = state.chemicals.find(c => c.id === state.formData.chemId);
        const ruleLocGroup = chem.location.includes('原膠室') ? '原膠室(C4+P1)' : chem.location;
        const rules = applicationRules[ruleLocGroup] || [];
        const rule = rules.find(r => r.category === chem.category && r.petroleumClass === chem.petroleumClass);

        if (rule) {
          const currentItems = state.inventoryData.filter(d => d.date === state.formData.date && d.id !== state.editingId);
          const currentTotal = currentItems.reduce((sum, item) => {
            const cInfo = state.chemicals.find(c => c.id === item.chemId);
            if (cInfo && 
                (cInfo.location === chem.location || (ruleLocGroup === '原膠室(C4+P1)' && cInfo.location.includes('原膠室'))) && 
                cInfo.category === chem.category && 
                cInfo.petroleumClass === chem.petroleumClass) {
              return sum + item.storageAmt;
            }
            return sum;
          }, 0);

          const inputAmt = parseFloat(state.formData.storageAmt);
          const projectedTotal = currentTotal + inputAmt;

          if (projectedTotal > rule.applyAmt) {
            const displayCat = rule.label || chem.category;
            DOM.modalMsg.innerHTML = `「${ruleLocGroup}」的「${displayCat} (${chem.petroleumClass})」<br/><span class="text-red-600">庫存超過申請量，請調整庫存周轉率。</span>`;
            DOM.modalApplyAmt.innerText = `${rule.applyAmt.toFixed(2)} L`;
            DOM.modalCurrentTotal.innerText = currentTotal.toFixed(2);
            DOM.modalInputAmt.innerText = `+${inputAmt.toFixed(2)}`;
            DOM.modalProjected.innerText = projectedTotal.toFixed(2);
            DOM.modalExcess.innerText = (projectedTotal - rule.applyAmt).toFixed(2);
            DOM.warningModal.classList.remove('hidden');
            DOM.warningModal.classList.add('flex');
            
            state.pendingSaveAction = () => executeSave();
            return;
          }
        }
        executeSave();
      });

      DOM.btnCancelSave.addEventListener('click', () => { DOM.warningModal.classList.remove('flex'); DOM.warningModal.classList.add('hidden'); });
      DOM.btnForceSave.addEventListener('click', () => { if(state.pendingSaveAction) state.pendingSaveAction(); });

      DOM.filterStart.addEventListener('change', window.applyFilters);
      DOM.filterEnd.addEventListener('change', window.applyFilters);
      DOM.filterClass.addEventListener('change', window.applyFilters);
      DOM.filterName.addEventListener('input', window.applyFilters);
      DOM.btnClearFilterName.addEventListener('click', () => { DOM.filterName.value = ''; window.applyFilters(); });
      
      DOM.btnClearFilters.addEventListener('click', () => {
        DOM.filterStart.value = todayStr;
        DOM.filterEnd.value = todayStr;
        DOM.filterClass.value = '';
        DOM.filterName.value = '';
        
        document.querySelectorAll('.loc-checkbox').forEach(cb => cb.checked = false);
        state.filters.locations = [];
        DOM.locFilterBtnText.innerText = '全區域';
        
        window.applyFilters();
      });

      DOM.reportDateSelect.addEventListener('change', (e) => {
        state.selectedReportDate = e.target.value;
        renderSummary();
        lucide.createIcons();
      });

      DOM.btnExportExcel.addEventListener('click', exportExcel);
      DOM.fileUpload.addEventListener('change', handleFileUpload);
      DOM.btnShareLine.addEventListener('click', shareToLine);
    }

    function executeSave() {
      if (state.editingId) {
        state.inventoryData = state.inventoryData.map(item => item.id === state.editingId ? { ...item, date: state.formData.date, chemId: state.formData.chemId, storageAmt: parseFloat(state.formData.storageAmt) } : item);
      } else {
        state.inventoryData.unshift({ 
          id: crypto.randomUUID(), 
          createdAt: Date.now(),
          date: state.formData.date, 
          chemId: state.formData.chemId, 
          storageAmt: parseFloat(state.formData.storageAmt) 
        });
      }
      
      saveDataToStorage();

      state.formData.chemId = '';
      state.formData.storageAmt = '';
      state.editingId = null;

      DOM.chemSearchInput.value = '';
      DOM.inputStorageAmt.value = '';
      DOM.chemInfoPanel.classList.add('hidden');
      DOM.btnClearChem.classList.add('hidden');
      DOM.btnClearStorage.classList.add('hidden');

      DOM.btnSubmit.innerText = '儲存資料';
      DOM.btnSubmit.classList.replace('bg-amber-600', 'bg-benq-main');
      DOM.btnSubmit.classList.replace('hover:bg-amber-700', 'hover:bg-benq-dark');
      DOM.editingBadge.classList.add('hidden');
      
      DOM.warningModal.classList.remove('flex'); DOM.warningModal.classList.add('hidden');
      processData();
    }

    function exportExcel() {
      if (!window.XLSX) return alert('Excel 引擎載入中，請稍候重試');
      const ws_data = [['盤點日期', '儲存場所', '標示版歸類', '類別', '化學品名稱', '閃火點', '管制量(L)', '儲存量(kg/L)', '倍數']];
      state.filteredData.forEach(row => {
        ws_data.push([row.date, row.location, row.category, row.petroleumClass, row.chemName, row.flashPoint, row.controlAmt, row.storageAmt, row.multiple]);
      });
      const ws = XLSX.utils.aoa_to_sheet(ws_data);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "化學品庫存");
      XLSX.writeFile(wb, `BML_公共危險品庫存_${new Date().toISOString().split('T')[0]}.xlsx`);
    }

    function handleFileUpload(e) {
      const file = e.target.files[0];
      if (!file || !window.XLSX) return;
      const reader = new FileReader();
      reader.onload = (event) => {
        try {
          const data = new Uint8Array(event.target.result);
          const workbook = XLSX.read(data, { type: 'array' });
          const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
          if (rows.length < 2) return alert('Excel 內無資料');
          
          const h = rows[0];
          const idx = {
            date: h.findIndex(x => typeof x === 'string' && x.includes('日期')),
            loc: h.findIndex(x => typeof x === 'string' && x.includes('場所')),
            name: h.findIndex(x => typeof x === 'string' && x.includes('名稱')),
            cat: h.findIndex(x => typeof x === 'string' && x.includes('標示版歸類')),
            petro: h.findIndex(x => typeof x === 'string' && (x.includes('類別') || x.includes('種類'))),
            flash: h.findIndex(x => typeof x === 'string' && x.includes('閃火點')),
            ctrl: h.findIndex(x => typeof x === 'string' && x.includes('管制量')),
            storage: h.findIndex(x => typeof x === 'string' && x.includes('儲存量'))
          };

          if (idx.date === -1 || idx.name === -1 || idx.storage === -1) return alert('Excel 欄位標題不符');

          const imported = [];
          for (let i = 1; i < rows.length; i++) {
            const c = rows[i]; if (!c || c.length < 3) continue;
            let dStr = c[idx.date];
            if (typeof dStr === 'number') dStr = new Date(new Date(Date.UTC(1899, 11, 30)).getTime() + dStr * 86400000).toISOString().split('T')[0];
            else if (typeof dStr === 'string') dStr = dStr.trim().replace(/\//g, '-').split(' ')[0];

            const name = c[idx.name]?.toString().trim();
            const amt = parseFloat(c[idx.storage]);
            if (!dStr || !name || isNaN(amt)) continue;

            const loc = idx.loc !== -1 ? c[idx.loc]?.toString().trim() : '未分類';
            const cat = idx.cat !== -1 ? c[idx.cat]?.toString().trim() : '未分類';
            const petro = idx.petro !== -1 ? c[idx.petro]?.toString().trim() : '未分類';
            const flash = idx.flash !== -1 ? c[idx.flash]?.toString().trim() : '';
            const ctrl = idx.ctrl !== -1 ? parseFloat(c[idx.ctrl]) : 0;

            let chem = state.chemicals.find(x => x.name === name && x.location === loc);
            if (!chem) {
              chem = { id: crypto.randomUUID(), name, location: loc, category: cat, petroleumClass: petro, flashPoint: flash, controlAmt: ctrl };
              state.chemicals.push(chem);
            }
            imported.push({ id: crypto.randomUUID(), createdAt: Date.now() + i, date: dStr, chemId: chem.id, storageAmt: amt });
          }
          state.inventoryData.push(...imported);
          saveDataToStorage(); 
          processData();
          alert(`成功從 Excel 匯入 ${imported.length} 筆紀錄`);
        } catch(err) { alert('匯入失敗，請確認檔案格式'); }
      };
      reader.readAsArrayBuffer(file);
      e.target.value = null;
    }

    async function shareToLine() {
      if (!window.XLSX) return alert('Excel 引擎載入中');
      const ws_data = [['盤點日期', '儲存場所', '標示版歸類', '類別', '化學品名稱', '閃火點', '管制量(L)', '儲存量(kg/L)', '倍數']];
      state.filteredData.forEach(row => ws_data.push([row.date, row.location, row.category, row.petroleumClass, row.chemName, row.flashPoint, row.controlAmt, row.storageAmt, row.multiple]));
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(ws_data), "化學品庫存");
      const excelBuffer = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
      const fileName = `BML_公共危險品庫存_${new Date().toISOString().split('T')[0]}.xlsx`;
      const file = new File([excelBuffer], fileName, { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });

      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

      if (isMobile && navigator.canShare && navigator.canShare({ files: [file] })) {
        try { 
          await navigator.share({ title: 'BML 庫存報表', text: '請查收公共危險品庫存資料。', files: [file] }); 
          return; 
        } 
        catch (err) { console.log('原生分享取消或失敗', err); }
      } 
      
      XLSX.writeFile(wb, fileName);
      
      const lineText = encodeURIComponent('您好，這是我剛剛匯出的「BML 公共危險品庫存報表」。\n(請稍後查收我手動上傳的 Excel 檔案)');
      const confirmMsg = '【系統提示】\n由於 LINE 系統限制，無法直接透過網頁夾帶檔案。\n\n系統已為您「自動下載」Excel 檔案！\n點擊「確定」將會開啟 LINE，請您在 LINE 中手動上傳剛剛下載的檔案。';
      
      if (confirm(confirmMsg)) {
        window.open(`https://line.me/R/msg/text/?${lineText}`, '_blank');
      }
    }

    // 啟動程式
    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
