                                        <td className="p-4 text-slate-700 text-center font-mono font-bold whitespace-nowrap">{record.date}</td>
                                        <td className="p-4 text-slate-500 text-center font-mono text-xs whitespace-nowrap">
                                            <div className="font-medium text-slate-700 mb-1">{new Date(record.timestamp).toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit' })}</div>
                                            <div className="text-slate-400 text-[10px] font-bold bg-slate-100 rounded px-1 py-0.5 inline-block">{new Date(record.timestamp).toLocaleTimeString('zh-TW', { hour12: false, hour: '2-digit', minute: '2-digit' })}</div>
                                        </td>
                                        <td className="p-4 text-slate-800 text-center font-bold">{record.location}</td>
                                        <td className="p-4 text-slate-700 text-center text-sm font-bold">{record.labelCategory}</td>
                                        <td className="p-4 text-brand-900 font-bold text-center">{record.chemical}</td>
                                        <td className="p-4 text-slate-500 font-mono text-xs text-center font-medium">{record.partNo || '-'}</td>
                                        <td className="p-4 text-slate-700 text-center text-xs font-semibold">{record.hazard}</td>
                                        <td className={`p-4 text-center font-bold text-sm ${String(record.type || "").includes('第一石油類') ? 'text-danger' : String(record.type || "").includes('第二石油類') ? 'text-accent-600' : 'text-slate-700'}`}>
                                            {record.type}
                                        </td>
                                        <td className="p-4 text-slate-600 text-center text-xs font-medium">{record.solubility}</td>
                                        <td className="p-4 text-slate-700 text-center font-mono font-medium">{record.limit}</td>
                                        <td className="p-4 text-slate-700 text-center font-mono font-medium">{record.flashPoint}</td>
                                        <td className="p-4 text-center text-brand-700 font-black font-mono text-base">{record.amount}</td>
                                        <td className="p-4 text-slate-800 font-black text-center font-mono">{record.limit ? (record.amount / record.limit).toFixed(2) : "0.00"}</td>
                                        <td className="p-4 text-center">
                                            <div className="flex justify-center gap-2">
                                                <button onClick={() => onEdit(record)} className="text-brand-600 hover:text-brand-800 p-2 hover:bg-brand-100 rounded-lg transition-colors border border-transparent hover:border-brand-200" title="修改"><Edit size={18} /></button>
                                                <button onClick={() => onDelete(record.id)} className="text-danger hover:text-red-700 p-2 hover:bg-red-50 rounded-lg transition-colors border border-transparent hover:border-red-200" title="刪除"><Trash2 size={18} /></button>
                                            </div>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        });

        const App = () => {
            const [records, setRecords] = useState([]);
            const [customChemicals, setCustomChemicals] = useState({});
            const [selectedIds, setSelectedIds] = useState(new Set());
            const [activeTab, setActiveTab] = useState('list');
            const [showFiltersMobile, setShowFiltersMobile] = useState(false);

            const chemicalDB = useMemo(() => ({
                ...INITIAL_CHEMICAL_DB,
                ...customChemicals
            }), [customChemicals]);
            
            const today = new Date().toISOString().split('T')[0];
            const [formData, setFormData] = useState({ date: today, chemical: '', location: '', amount: '' });
            
            const currentDetails = useMemo(() => {
                return chemicalDB[formData.chemical] || null;
            }, [formData.chemical, chemicalDB]);
            
            const fullChemicalList = useMemo(() => Object.keys(chemicalDB), [chemicalDB]);

            const [editId, setEditId] = useState(null);
            const isAdmin = true;
            const [showAddChemModal, setShowAddChemModal] = useState(false);
            
            const [newChemData, setNewChemData] = useState({
                name: '', labelCategory: '', partNo: '', hazard: '', type: '', solubility: '', limit: '', flashPoint: ''
            });

            const fileInputRef = useRef(null); 
            const amountInputRef = useRef(null);
            
            const [filterStartDate, setFilterStartDate] = useState(today);
            const [filterEndDate, setFilterEndDate] = useState(today);
            const [filterChemical, setFilterChemical] = useState(new Set());
            const [filterLocation, setFilterLocation] = useState(new Set());
            const [filterLabelCategory, setFilterLabelCategory] = useState('');
            const [filterType, setFilterType] = useState('');
            const [filterHazard, setFilterHazard] = useState('');
            
            const [notification, setNotification] = useState(null);
            const [deleteModal, setDeleteModal] = useState({ isOpen: false, targetIds: [] });
            
            useEffect(() => {
                const handleContextMenu = (e) => { e.preventDefault(); };
                document.addEventListener('contextmenu', handleContextMenu);
                return () => { document.removeEventListener('contextmenu', handleContextMenu); };
            }, []);
            
            useEffect(() => {
                const handleKeyDown = (e) => { if (deleteModal.isOpen && e.key === 'Enter') confirmDelete(); };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [deleteModal.isOpen]); 

            useEffect(() => {
                const initData = async () => {
                    const savedCustom = localStorage.getItem('custom_chemicals');
                    try { if (savedCustom) setCustomChemicals(JSON.parse(savedCustom)); } 
                    catch (error) { localStorage.removeItem('custom_chemicals'); }

                    const saved = localStorage.getItem('chemical_records');
                    if (saved) { 
                        let parsed = [];
                        try {
                             parsed = JSON.parse(saved);
                             parsed = parsed.map(p => ({
                                 ...p, 
                                 timestamp: p.timestamp || Date.now(),
                                 chemical: p.chemical || "",
                                 labelCategory: p.labelCategory || "",
                                 type: p.type || "",
                                 date: p.date || new Date().toISOString().split('T')[0]
                             })); 
                        } catch(e) { console.error("Error parsing records:", e); }
                        setRecords(parsed); 
                    }
                };
                initData();
            }, []);

            useEffect(() => { localStorage.setItem('chemical_records', JSON.stringify(records)); }, [records]);
            useEffect(() => { localStorage.setItem('custom_chemicals', JSON.stringify(customChemicals)); }, [customChemicals]);

            const showNotification = (message, type = 'success') => { setNotification({ message, type }); setTimeout(() => setNotification(null), 3000); };
            const handleInputChange = (e) => { const { name, value } = e.target; setFormData(prev => ({ ...prev, [name]: value })); };
            
            const handleNewChemChange = (e) => { const { name, value } = e.target; setNewChemData(prev => ({ ...prev, [name]: value })); };

            const handleAddNewChemical = (e) => {
                e.preventDefault();
                const { name, labelCategory, partNo, hazard, type, solubility, limit, flashPoint } = newChemData;
                if (!name || !labelCategory || !limit) { showNotification("請至少填寫化學品名稱、歸類與管制量", "error"); return; }

                const newChemEntry = { [name]: { labelCategory, partNo, hazard, type, solubility, limit: parseFloat(limit), flashPoint: parseFloat(flashPoint) || 0 } };
                setCustomChemicals(prev => ({ ...prev, ...newChemEntry }));
                setShowAddChemModal(false);
                setNewChemData({ name: '', labelCategory: '', partNo: '', hazard: '', type: '', solubility: '', limit: '', flashPoint: '' });
                showNotification(`成功儲存化學品：${name}`, "success");
            };

            const handleDeleteCustomChemical = (name) => {
                if(!confirm(`確定刪除 ${name}?`)) return;
                const newCustoms = { ...customChemicals };
                delete newCustoms[name];
                setCustomChemicals(newCustoms);
                showNotification(`已刪除 ${name}`, "success");
            }

            const handleEditCustomChemical = (name) => {
                const chem = customChemicals[name];
                setNewChemData({ name, ...chem });
            }

            const handleAddRecord = async (e) => {
                e.preventDefault();
                if (!chemicalDB[formData.chemical]) { showNotification("請選擇清單內的化學品！若需新增請使用『化學品管理』功能。", "error"); return; }
                if (!formData.chemical || !formData.amount || !formData.date || !formData.location) { showNotification("請填寫所有欄位 (包含儲存場所)！", "error"); return; }
                
                const details = chemicalDB[formData.chemical] || { labelCategory: "", partNo: "", hazard: "", type: "", solubility: "", limit: 0, flashPoint: 0 };
                const recordData = { ...formData, amount: parseFloat(formData.amount), ...details, timestamp: Date.now() };
                
                if (editId) {
                    setRecords(prev => prev.map(r => r.id === editId ? { ...recordData, id: editId } : r));
                    showNotification("資料修改成功！", "success");
                    setEditId(null);
                } else {
                    const newRecord = { id: Date.now(), ...recordData };
                    setRecords(prev => [newRecord, ...prev]);
                    showNotification("資料新增成功！", "success");
                }
                
                if (editId) { setFormData({ date: today, chemical: '', location: '', amount: '' }); } 
                else { setFormData(prev => ({ ...prev, chemical: '', amount: '' })); }
            };
            
            const handleEdit = (record) => { setFormData({ date: record.date, chemical: record.chemical, location: record.location, amount: record.amount }); setEditId(record.id); window.scrollTo({ top: 0, behavior: 'smooth' }); showNotification("已載入資料，請在左側表單修改", "success"); };
            const handleCancelEdit = () => { setEditId(null); setFormData({ date: today, chemical: '', location: '', amount: '' }); showNotification("已取消修改", "success"); };
            
            const handleToggleSelect = (id) => {
                const newSelected = new Set(selectedIds);
                if (newSelected.has(id)) newSelected.delete(id); else newSelected.add(id);
                setSelectedIds(newSelected);
            };

            const handleSelectAll = (ids, isSelect) => {
                const newSelected = new Set(selectedIds);
                ids.forEach(id => { if (isSelect) newSelected.add(id); else newSelected.delete(id); });
                setSelectedIds(newSelected);
            };

            const initiateDelete = (id) => { setDeleteModal({ isOpen: true, targetIds: [id] }); };
            const initiateBulkDelete = (ids) => { setDeleteModal({ isOpen: true, targetIds: ids }); };

            const confirmDelete = () => {
                if (deleteModal.targetIds.length > 0) {
                    if (editId && deleteModal.targetIds.includes(editId)) { handleCancelEdit(); }
                    const idsToDelete = new Set(deleteModal.targetIds);
                    setRecords(records.filter(r => !idsToDelete.has(r.id)));
                    const newSelected = new Set(selectedIds);
                    deleteModal.targetIds.forEach(id => newSelected.delete(id));
                    setSelectedIds(newSelected);
                    showNotification(deleteModal.targetIds.length > 1 ? "批次刪除成功" : "資料已刪除", "success");
                }
                setDeleteModal({ isOpen: false, targetIds: [] });
            };
            
            const cancelDelete = () => { setDeleteModal({ isOpen: false, targetIds: [] }); };
            const handleImportClick = () => { fileInputRef.current.click(); };

            const normalizeDate = (dateStr) => {
                if (!dateStr) return "";
                const date = new Date(dateStr);
                if (isNaN(date.getTime())) return dateStr; 
                const y = date.getFullYear();
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const d = String(date.getDate()).padStart(2, '0');
                return `${y}-${m}-${d}`;
            };

            const handleFileChange = (e) => { 
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                const isExcel = file.name.endsWith('.xlsx') || file.name.endsWith('.xls');

                reader.onload = async (event) => {
                    let newRecords = [];
                    let successCount = 0;
                    
                    if (isExcel) {
                        try {
                            const data = new Uint8Array(event.target.result);
                            const workbook = XLSX.read(data, {type: 'array'});
                            const firstSheetName = workbook.SheetNames[0];
                            const worksheet = workbook.Sheets[firstSheetName];
                            const jsonData = XLSX.utils.sheet_to_json(worksheet, {header: 1, raw: false});
                            
                            if (jsonData.length > 1) {
                                for (let i = 1; i < jsonData.length; i++) {
                                    const row = jsonData[i];
                                    if (row.length < 12) continue;
                                    
                                    const date = normalizeDate(row[0]);
                                    const location = row[2];
                                    const chemical = row[3];
                                    const amountStr = row[11];
                                    const amount = parseFloat(amountStr);
                                    
                                    if (date && location && chemical && !isNaN(amount)) {
                                         const details = chemicalDB[chemical] || {
                                             labelCategory: row[4] || "", partNo: row[5] || "", hazard: row[6] || "", type: row[7] || "", solubility: row[8] || "", limit: parseFloat(row[9]) || 0, flashPoint: parseFloat(row[10]) || 0
                                         };
                                         if (!chemicalDB[chemical]) {
                                            if (row[4]) details.labelCategory = row[4];
                                            if (row[7]) details.type = row[7];
                                            if (row[9]) details.limit = parseFloat(row[9]);
                                         }
                                         let timestamp = Date.now() + i;
                                         if (row[1]) {
                                             const parsedTime = new Date(row[1]).getTime();
                                             if (!isNaN(parsedTime)) timestamp = parsedTime;
                                         }
                                         newRecords.push({ date, location, chemical, amount, ...details, timestamp: timestamp });
                                         successCount++;
                                    }
                                }
                            }
                        } catch (err) {
                            console.error("Excel parse error:", err);
                            showNotification("Excel 解析失敗，請確認檔案格式", "error");
                            return;
                        }
                    } else {
                        const text = event.target.result;
                        const workbook = XLSX.read(text, {type: 'string'});
                        const firstSheetName = workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[firstSheetName];
                        const jsonData = XLSX.utils.sheet_to_json(worksheet, {header: 1, raw: false});
                         
                        if (jsonData.length > 1) {
                             for (let i = 1; i < jsonData.length; i++) {
                                    const row = jsonData[i];
                                    if (!row || row.length < 12) continue;
                                    const date = normalizeDate(row[0]);
                                    const location = row[2];
                                    const chemical = row[3];
                                    const amount = parseFloat(row[11]);
                                    
                                    if (date && location && chemical && !isNaN(amount)) {
                                         const details = chemicalDB[chemical] || {
                                             labelCategory: row[4] || "", partNo: row[5] || "", hazard: row[6] || "", type: row[7] || "", solubility: row[8] || "", limit: parseFloat(row[9]) || 0, flashPoint: parseFloat(row[10]) || 0
                                         };
                                         let timestamp = Date.now() + i;
                                         if (row[1]) {
                                             const parsedTime = new Date(row[1]).getTime();
                                             if (!isNaN(parsedTime)) timestamp = parsedTime;
                                         }
                                         newRecords.push({ date, location, chemical, amount, ...details, timestamp: timestamp });
                                         successCount++;
                                    }
                             }
                        }
                    }

                    if (newRecords.length > 0) {
                        const localImport = newRecords.map(r => ({...r, id: r.timestamp + Math.random()}));
                        setRecords(prev => [...localImport, ...prev]);
                        setFilterStartDate(''); setFilterEndDate('');
                        showNotification(`成功匯入 ${successCount} 筆資料`, "success");
                    } else { showNotification("未找到有效資料或格式錯誤", "error"); }
                    e.target.value = '';
                };
                
                if (isExcel) { reader.readAsArrayBuffer(file); } else { reader.readAsText(file); }
            };
            
            // --- Excel 匯出與 Blob 產生器 ---
            const generateExcelBlob = () => {
                const header = ["盤點日期", "建檔日期", "儲存場所", "化學品名稱", "標示版歸類", "料號", "危物分類", "種類", "水溶性", "管制量(L)", "閃火點", "儲存量(kg/L)", "倍數"];
                const dataRows = filteredRecords.map(r => {
                    const ratio = r.limit ? (r.amount / r.limit).toFixed(2) : "0.00";
                    const dateObj = new Date(r.timestamp);
                    const y = dateObj.getFullYear();
                    const m = String(dateObj.getMonth() + 1).padStart(2, '0');
                    const d = String(dateObj.getDate()).padStart(2, '0');
                    const h = String(dateObj.getHours()).padStart(2, '0');
                    const min = String(dateObj.getMinutes()).padStart(2, '0');
                    const createDateStr = `${y}/${m}/${d} ${h}:${min}`;

                    return [
                        r.date, createDateStr, r.location, r.chemical, r.labelCategory, 
                        r.partNo || '', r.hazard, r.type, r.solubility, r.limit, r.flashPoint, r.amount, ratio
                    ];
                });

                const wsData = [header, ...dataRows];
                const ws = XLSX.utils.aoa_to_sheet(wsData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "庫存表");
                const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
                return new Blob([wbout], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
            };

            const handleExportExcel = () => {
                if (filteredRecords.length === 0) { showNotification("沒有資料可以匯出！", "error"); return; }
                const blob = generateExcelBlob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `公共危險物品庫存表_${new Date().toISOString().slice(0,10)}.xlsx`;
                a.click();
                URL.revokeObjectURL(url);
                showNotification("匯出成功！", "success");
            };

            // --- 分享至 LINE 功能 ---
            const handleShareLine = async () => {
                if (filteredRecords.length === 0) { showNotification("目前沒有資料可供分享！", "error"); return; }

                const blob = generateExcelBlob();
                const fileName = `公共危險物品庫存報告_${new Date().toISOString().slice(0,10)}.xlsx`;
                let textMsg = `【龍科廠-公共危險物品庫存報告】\n區間: ${filterStartDate || '最初'} ~ ${filterEndDate || '最新'}\n共計 ${filteredRecords.length} 筆資料。`;

                try {
                    // 呼叫原生分享選單夾帶 Excel 附檔
                    const file = new File([blob], fileName, { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                    
                    if (navigator.share) {
                        await navigator.share({
                            files: [file],
                            title: '公共危險物品庫存報告',
                            text: textMsg
                        });
                        showNotification("請在彈出的選單點選 LINE 傳送", "success");
                    } else {
                        throw new Error("不支援原生分享");
                    }
                } catch (error) {
                    if (error.name === 'AbortError') return;
                    console.error("分享失敗:", error);
                    showNotification("無法啟動檔案分享，已改為直接下載檔案", "error");
                    handleExportExcel();
                }
            };

            const uniqueLabelCategories = useMemo(() => [...new Set(Object.values(chemicalDB).map(c => c.labelCategory))].sort(), [chemicalDB]);
            const uniqueTypes = useMemo(() => [...new Set(Object.values(chemicalDB).map(c => c.type))].sort(), [chemicalDB]);
            const uniqueHazards = useMemo(() => [...new Set(Object.values(chemicalDB).map(c => c.hazard))].sort(), [chemicalDB]);

            const filteredRecords = useMemo(() => {
                return records.filter(record => {
                    const isAfterStart = !filterStartDate || record.date >= filterStartDate;
                    const isBeforeEnd = !filterEndDate || record.date <= filterEndDate;
                    const isChemicalMatch = filterChemical.size === 0 || filterChemical.has(record.chemical);
                    const isLocationMatch = filterLocation.size === 0 || filterLocation.has(record.location); 
                    const isLabelMatch = !filterLabelCategory || String(record.labelCategory || "").toLowerCase().includes(filterLabelCategory.toLowerCase());
                    const isTypeMatch = !filterType || record.type === filterType;
                    const isHazardMatch = !filterHazard || record.hazard === filterHazard;
                    return isAfterStart && isBeforeEnd && isChemicalMatch && isLocationMatch && isLabelMatch && isTypeMatch && isHazardMatch;
                });
            }, [records, filterStartDate, filterEndDate, filterChemical, filterLocation, filterLabelCategory, filterType, filterHazard]);

            const clearFilters = () => { 
                setFilterStartDate(today); setFilterEndDate(today); 
                setFilterChemical(new Set()); setFilterLocation(new Set()); 
                setFilterLabelCategory(''); setFilterType(''); setFilterHazard(''); 
            };

            const warehouseRecords = useMemo(() => filteredRecords.filter(r => r.location === '危險品庫房'), [filteredRecords]);
            const l30Records = useMemo(() => filteredRecords.filter(r => ['C4原膠室', 'P1原膠室'].includes(r.location)), [filteredRecords]);
            
            const totalAmounts = useMemo(() => {
                const warehouse = warehouseRecords.reduce((sum, r) => sum + (Number(r.amount) || 0), 0);
                const l30 = l30Records.reduce((sum, r) => sum + (Number(r.amount) || 0), 0);
                return { warehouse, l30 };
            }, [warehouseRecords, l30Records]);

            const emptyStateMessage = (
                <div className="p-10 text-center text-slate-400 flex flex-col items-center justify-center bg-white rounded-xl border border-slate-300 shadow-sm mt-6">
                    <FileSpreadsheet size={48} className="mb-2 opacity-20" />
                    尚無資料，請從左側新增或調整篩選條件。
                </div>
            );

            return (
                <div className="min-h-screen bg-brand-50 p-4 md:p-8 font-sans relative">
                    {/* Notifications */}
                    {notification && (<div className={`fixed bottom-6 right-6 px-6 py-4 rounded-lg shadow-xl flex items-center gap-3 z-50 animate-bounce-in text-white font-medium ${notification.type === 'error' ? 'bg-red-500' : 'bg-brand-600'}`}>{notification.type === 'error' ? <AlertCircle size={24} /> : <CheckCircle size={24} />}{notification.message}</div>)}
                    <input type="file" ref={fileInputRef} className="hidden" accept=".csv, .xlsx, .xls" onChange={handleFileChange} />
                    
                     {/* 化學品管理 Modal 觸發按鈕 */}
                    <div className="fixed top-4 right-4 z-50 flex gap-2">
                        <div className="flex gap-2">
                            <button onClick={() => setShowAddChemModal(true)} className="px-4 py-2 rounded-lg text-xs font-bold shadow-lg border bg-brand-600 text-white border-brand-500 flex items-center gap-2 hover:bg-brand-700 transition-all transform hover:scale-105 active:scale-95">
                                <FlaskConical size={16} /> 化學品管理
                            </button>
                        </div>
                    </div>

                    {/* 刪除確認 Modal */}
                    {deleteModal.isOpen && (
                        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50">
                            <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-sm mx-4 animate-scale-up border border-slate-100">
                                <div className="flex flex-col items-center text-center">
                                    <div className="bg-red-50 p-4 rounded-full mb-6">
                                        <AlertTriangle className="text-red-500" size={40} />
                                    </div>
                                    <h3 className="text-xl font-bold text-slate-800 mb-2">確定刪除資料？</h3>
                                    <p className="text-slate-500 mb-8 leading-relaxed">
                                        此動作將無法復原，您確定要永久刪除
                                        {deleteModal.targetIds.length > 1 ? ` ${deleteModal.targetIds.length} 筆` : '這筆'}紀錄嗎？
                                    </p>
                                    <div className="flex gap-3 w-full">
                                        <button onClick={cancelDelete} className="flex-1 px-4 py-3 bg-slate-100 text-slate-700 font-bold rounded-xl hover:bg-slate-200 transition-colors">取消</button>
                                        <button onClick={confirmDelete} className="flex-1 px-4 py-3 bg-red-500 text-white font-bold rounded-xl hover:bg-red-600 transition-colors shadow-lg shadow-red-200">確定刪除</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* 化學品管理 Modal */}
                    {showAddChemModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-md flex items-center justify-center z-[9999] overflow-y-auto py-10 px-4">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl mx-auto animate-scale-up border border-slate-200/50 flex flex-col max-h-[90vh]">
                                <div className="p-6 border-b border-slate-100 bg-brand-50/50 rounded-t-2xl">
                                    <h2 className="text-2xl font-bold text-brand-800 flex items-center gap-3">
                                        <div className="p-2 bg-brand-100 rounded-lg text-brand-600">
                                            <FlaskConical size={24} />
                                        </div>
                                        管理化學品資料庫
                                    </h2>
                                    <p className="text-slate-500 text-sm mt-1 ml-11">新增或編輯自定義化學品設定</p>
                                </div>
                                
                                <div className="p-6 overflow-y-auto custom-scrollbar">
                                    <form onSubmit={handleAddNewChemical} className="space-y-5 mb-8">
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                            <div className="space-y-1">
                                                <label className="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">化學品名稱 *</label>
                                                <input type="text" name="name" value={newChemData.name} onChange={handleNewChemChange} className="w-full p-3 text-sm border border-slate-300 rounded-xl focus:ring-2 focus:ring-brand-500 transition-all bg-slate-50 focus:bg-white" placeholder="輸入名稱 (存在即覆蓋)" required />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">標示版歸類 *</label>
                                                <input type="text" name="labelCategory" value={newChemData.labelCategory} onChange={handleNewChemChange} className="w-full p-3 text-sm border border-slate-300 rounded-xl focus:ring-2 focus:ring-brand-500 transition-all bg-slate-50 focus:bg-white" placeholder="例如: 添加劑" required />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">料號</label>
                                                <input type="text" name="partNo" value={newChemData.partNo} onChange={handleNewChemChange} className="w-full p-3 text-sm border border-slate-300 rounded-xl focus:ring-2 focus:ring-brand-500 transition-all bg-slate-50 focus:bg-white" />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">危物分類</label>
                                                <input type="text" name="hazard" value={newChemData.hazard} onChange={handleNewChemChange} className="w-full p-3 text-sm border border-slate-300 rounded-xl focus:ring-2 focus:ring-brand-500 transition-all bg-slate-50 focus:bg-white" placeholder="例如: 第四類 易燃液體" />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">種類</label>
                                                <select name="type" value={newChemData.type} onChange={handleNewChemChange} className="w-full p-3 text-sm border border-slate-300 rounded-xl focus:ring-2 focus:ring-brand-500 transition-all bg-slate-50 focus:bg-white cursor-pointer">
                                                    <option value="">請選擇</option>
                                                    {HAZARD_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                                                </select>
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">水溶性</label>
                                                <select name="solubility" value={newChemData.solubility} onChange={handleNewChemChange} className="w-full p-3 text-sm border border-slate-300 rounded-xl focus:ring-2 focus:ring-brand-500 transition-all bg-slate-50 focus:bg-white cursor-pointer">
                                                    <option value="">請選擇</option>
                                                    {SOLUBILITY_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                                                </select>
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">管制量(L) *</label>
                                                <input type="number" name="limit" value={newChemData.limit} onChange={handleNewChemChange} className="w-full p-3 text-sm border border-slate-300 rounded-xl focus:ring-2 focus:ring-brand-500 transition-all bg-slate-50 focus:bg-white" required />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">閃火點</label>
                                                <input type="number" name="flashPoint" value={newChemData.flashPoint} onChange={handleNewChemChange} className="w-full p-3 text-sm border border-slate-300 rounded-xl focus:ring-2 focus:ring-brand-500 transition-all bg-slate-50 focus:bg-white" />
                                            </div>
                                        </div>
                                        <div className="flex gap-3 pt-2">
                                            <button type="submit" className="flex-1 px-4 py-3 bg-brand-600 text-white font-bold rounded-xl hover:bg-brand-700 transition-colors shadow-lg shadow-brand-200">
                                                <Icon path={<><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></>} size={18} className="inline mr-2" />
                                                儲存 / 更新資料
                                            </button>
                                        </div>
                                    </form>
                                    
                                    <div className="border-t border-slate-200 pt-6">
                                        <h3 className="text-lg font-bold text-slate-700 mb-4 flex items-center gap-2">
                                            <Database size={18} className="text-slate-400" />
                                            自定義化學品列表
                                        </h3>
                                        <div className="overflow-hidden rounded-xl border border-slate-200 bg-white">
                                            <div className="overflow-y-auto max-h-60 custom-scrollbar">
                                                <table className="w-full text-left text-sm">
                                                    <thead className="bg-slate-50 text-slate-500 font-semibold sticky top-0 z-10">
                                                        <tr>
                                                            <th className="p-3 border-b border-slate-200">名稱</th>
                                                            <th className="p-3 border-b border-slate-200">歸類</th>
                                                            <th className="p-3 border-b border-slate-200">管制量</th>
                                                            <th className="p-3 border-b border-slate-200 text-center">操作</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-slate-100">
                                                        {Object.keys(customChemicals).length > 0 ? (
                                                            Object.entries(customChemicals).map(([name, data]) => (
                                                                <tr key={name} className="hover:bg-brand-50 transition-colors">
                                                                    <td className="p-3 font-medium text-slate-700">{name}</td>
                                                                    <td className="p-3 text-slate-600">{data.labelCategory}</td>
                                                                    <td className="p-3 text-slate-600 font-mono">{data.limit}</td>
                                                                    <td className="p-3 text-center flex justify-center gap-2">
                                                                        <button onClick={() => handleEditCustomChemical(name)} className="p-1.5 text-brand-500 hover:bg-brand-50 rounded-lg transition-colors" title="編輯"><Edit size={16} /></button>
                                                                        <button onClick={() => handleDeleteCustomChemical(name)} className="p-1.5 text-red-400 hover:bg-red-50 rounded-lg transition-colors" title="刪除"><Trash2 size={16} /></button>
                                                                    </td>
                                                                </tr>
                                                            ))
                                                        ) : (
                                                            <tr><td colSpan="4" className="p-8 text-center text-slate-400 italic">尚無自定義化學品</td></tr>
                                                        )}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="p-4 border-t border-slate-100 bg-slate-50 rounded-b-2xl flex justify-end">
                                    <button type="button" onClick={() => setShowAddChemModal(false)} className="px-6 py-2.5 bg-white border border-slate-300 text-slate-700 font-bold rounded-xl hover:bg-slate-50 transition-colors shadow-sm">
                                        關閉視窗
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    <div className="max-w-[1600px] mx-auto">
                        <header className="mb-6 md:mb-10 text-center md:text-left pt-6 pb-6 bg-white border-b-4 border-brand-500 shadow-sm rounded-2xl px-6">
                             <div className="flex flex-col md:flex-row items-center justify-center md:justify-start gap-3 md:gap-5">
                                <div>
                                    <h1 className="text-xl md:text-3xl font-black text-brand-800 flex flex-col md:flex-row items-center gap-1 md:gap-3 tracking-tight">
                                        龍科廠 <span className="hidden md:inline text-brand-300 font-light">|</span> 公共危險物品儲存量管理
                                    </h1>
                                </div>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 xl:grid-cols-5 gap-6 items-start">
                            
                            {/* 左側：輸入表單區 */}
                            <div className="xl:col-span-1 space-y-6">
                                <div className={`bg-white rounded-2xl shadow-sharp p-4 md:p-6 border min-w-0 transition-all duration-300 ${editId ? 'border-brand-500 ring-4 ring-brand-50' : 'border-brand-100'}`}>
                                    <h2 className="text-lg font-bold mb-4 text-brand-800 flex items-center gap-2 pb-3 border-b border-brand-50">
                                        <div className={`p-1.5 rounded-lg ${editId ? 'bg-brand-100 text-brand-600' : 'bg-brand-100 text-brand-600'}`}>
                                            {editId ? <Edit size={18} /> : <PlusCircle size={18} />}
                                        </div>
                                        {editId ? '修改資料' : '實際儲存量輸入'}
                                    </h2>
                                    
                                    <form onSubmit={handleAddRecord} className="space-y-4 w-full flex flex-col">
                                        <div className="w-full box-border">
                                            <label className="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1 block mb-1">庫存盤點日期</label>
                                            <input type="date" name="date" value={formData.date} onChange={handleInputChange} className="w-full px-3 py-2.5 text-sm border border-slate-300 rounded-xl focus:ring-2 focus:ring-brand-500 transition-all bg-slate-50 outline-none box-border" required />
                                        </div>
                                        <div className="w-full box-border">
                                            <label className="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1 block mb-1">儲存場所</label>
                                            <div className="relative">
                                                <MapPin className="absolute left-3 top-3 text-slate-400" size={18} />
                                                <select name="location" value={formData.location} onChange={handleInputChange} className="w-full p-2.5 pl-10 text-sm border border-slate-300 rounded-xl focus:ring-2 focus:ring-brand-500 bg-slate-50 transition-all outline-none appearance-none cursor-pointer box-border" required>
                                                    <option value="">-- 請選擇儲存場所 --</option>
                                                    {STORAGE_LOCATIONS.map((loc, index) => (<option key={index} value={loc}>{loc}</option>))}
                                                </select>
                                                <ChevronDown className="absolute right-3 top-3 text-slate-400 pointer-events-none" size={16} />
                                            </div>
                                        </div>
                                        <div className="w-full box-border">
                                            <label className="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1 block mb-1">化學品名稱</label>
                                            <div className="relative">
                                                <Search className="absolute left-3 top-3 text-slate-400" size={18} />
                                                <SearchableSelect 
                                                    value={formData.chemical}
                                                    onChange={(val) => setFormData(prev => ({ ...prev, chemical: val }))}
                                                    onKeyDown={(e) => { if (e.key === 'Enter') { e.preventDefault(); amountInputRef.current?.focus(); } }}
                                                    options={fullChemicalList}
                                                    placeholder="搜尋..."
                                                />
                                            </div>
                                        </div>

                                        {currentDetails && (
                                            <div className="bg-brand-50/80 p-3 rounded-xl text-xs space-y-1.5 border border-brand-100 text-brand-800 animate-fade-in shadow-sm w-full box-border">
                                                <div className="flex justify-between border-b border-brand-100 pb-1"><span className="font-bold">分類</span> <span>{currentDetails.labelCategory}</span></div>
                                                <div className="flex justify-between border-b border-brand-100 pb-1"><span className="font-bold">危物</span> <span>{currentDetails.hazard}</span></div>
                                                <div className="flex justify-between"><span className="font-bold">管制量</span> <span className="font-mono bg-white px-1.5 rounded text-brand-600 border border-brand-100">{currentDetails.limit} L</span></div>
                                            </div>
                                        )}

                                        <div className="w-full box-border">
                                            <label className="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1 block mb-1">儲存量 (kg/L)</label>
                                            <input 
                                                ref={amountInputRef} type="number" step="0.01" name="amount" value={formData.amount} onChange={handleInputChange} placeholder="輸入數字..." 
                                                className="w-full px-3 py-2.5 text-sm border border-slate-300 rounded-xl focus:ring-2 focus:ring-brand-500 transition-all bg-slate-50 outline-none font-mono box-border" required 
                                            />
                                        </div>

                                        <div className="flex gap-2 pt-2 w-full box-border">
                                            {editId && (
                                                <button type="button" onClick={handleCancelEdit} className="w-1/3 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-2.5 rounded-xl transition-all border border-slate-300">
                                                    取消
                                                </button>
                                            )}
                                            <button type="submit" className={`flex-1 ${editId ? 'bg-brand-600 hover:bg-brand-700' : 'bg-brand-600 hover:bg-brand-700'} text-white font-bold py-2.5 rounded-xl flex items-center justify-center gap-2 transition-all shadow-md`}>
                                                {editId ? <Edit size={18} /> : <Save size={18} />}
                                                {editId ? '確認修改' : '儲存資料'}
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </div>

                            {/* 右側：顯示與操作區 (佔 4/5) */}
                            <div className="xl:col-span-4 space-y-4 flex flex-col min-w-0">
                                
                                {/* 資料篩選工具 */}
                                <div className="bg-white rounded-2xl shadow-sm border border-brand-100 p-5 transition-all w-full">
                                    <div className="flex flex-col gap-4">
                                        <div className="flex justify-between items-center cursor-pointer md:cursor-default" onClick={() => window.innerWidth < 768 && setShowFiltersMobile(!showFiltersMobile)}>
                                            <div className="flex items-center gap-2 text-brand-800 font-bold text-lg">
                                                <div className="p-2 bg-brand-50 rounded-lg text-brand-600 border border-brand-100"><Filter size={20} /></div>
                                                資料篩選與匯出
                                            </div>
                                            <div className="flex items-center gap-3">
                                                <ChevronDown className={`md:hidden text-brand-400 transition-transform ${showFiltersMobile ? 'rotate-180' : ''}`} />
                                            </div>
                                        </div>
                                        
                                        <div className={`${showFiltersMobile ? 'block' : 'hidden'} md:block space-y-4`}>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                                                <div className="flex flex-col gap-1.5 col-span-1 sm:col-span-2">
                                                    <div className="flex items-center gap-2 text-xs font-bold text-slate-600 uppercase tracking-wide"><CalendarIcon size={14} /> 盤點日期區間</div>
                                                    <div className="flex items-center gap-2 bg-slate-50 px-2 py-1 rounded-xl border border-slate-300 focus-within:ring-2 focus-within:ring-brand-500">
                                                        <input type="date" value={filterStartDate} onChange={(e) => setFilterStartDate(e.target.value)} className="bg-transparent border-none text-slate-800 text-sm w-full focus:ring-0 outline-none py-1.5" />
                                                        <span className="text-slate-400 text-xs">➜</span>
                                                        <input type="date" value={filterEndDate} onChange={(e) => setFilterEndDate(e.target.value)} className="bg-transparent border-none text-slate-800 text-sm w-full focus:ring-0 outline-none py-1.5" />
                                                    </div>
                                                </div>
                                                
                                                <div className="w-full space-y-1.5">
                                                    <div className="flex items-center gap-2 text-xs font-bold text-slate-600 uppercase tracking-wide"><MapPin size={14} /> 儲存場所</div>
                                                    <MultiSelectDropdown options={STORAGE_LOCATIONS} selected={filterLocation} onChange={setFilterLocation} placeholder="選擇場所..." />
                                                </div>
                                                
                                                <div className="w-full space-y-1.5">
                                                    <div className="flex items-center gap-2 text-xs font-bold text-slate-600 uppercase tracking-wide"><Tag size={14} /> 標示版歸類</div>
                                                    <SearchableSelect value={filterLabelCategory} onChange={setFilterLabelCategory} options={uniqueLabelCategories} placeholder="選擇歸類..." icon={null} />
                                                </div>
                                                
                                                <div className="w-full space-y-1.5">
                                                    <div className="flex items-center gap-2 text-xs font-bold text-slate-600 uppercase tracking-wide"><ShieldAlert size={14} /> 危物分類</div>
                                                    <select value={filterHazard} onChange={(e) => setFilterHazard(e.target.value)} className="w-full bg-slate-50 border border-slate-300 rounded-xl px-3 py-2.5 text-sm focus:ring-2 focus:ring-brand-500 outline-none transition-colors cursor-pointer text-slate-800">
                                                        <option value="">全部危物</option>
                                                        {uniqueHazards.map(h => <option key={h} value={h}>{h}</option>)}
                                                    </select>
                                                </div>
                                                
                                                <div className="w-full space-y-1.5">
                                                    <div className="flex items-center gap-2 text-xs font-bold text-slate-600 uppercase tracking-wide"><FlaskConical size={14} /> 種類</div>
                                                    <select value={filterType} onChange={(e) => setFilterType(e.target.value)} className="w-full bg-slate-50 border border-slate-300 rounded-xl px-3 py-2.5 text-sm focus:ring-2 focus:ring-brand-500 outline-none transition-colors cursor-pointer text-slate-800">
                                                        <option value="">全部種類</option>
                                                        {uniqueTypes.map(t => <option key={t} value={t}>{t}</option>)}
                                                    </select>
                                                </div>
                                                
                                                <div className="w-full space-y-1.5">
                                                    <div className="flex items-center gap-2 text-xs font-bold text-slate-600 uppercase tracking-wide"><Search size={14} /> 化學品名稱</div>
                                                    <MultiSelectDropdown options={fullChemicalList} selected={filterChemical} onChange={setFilterChemical} placeholder="勾選化學品..." />
                                                </div>

                                                {(filterStartDate || filterEndDate || filterChemical.size > 0 || filterLocation.size > 0 || filterLabelCategory || filterHazard || filterType) && (
                                                    <div className="flex items-end justify-end">
                                                        <button onClick={clearFilters} className="flex items-center justify-center gap-2 text-sm text-slate-600 bg-slate-100 hover:bg-slate-200 border border-slate-300 px-4 py-2.5 rounded-xl transition-colors w-full font-bold">
                                                            <XIcon size={16} /> 清除篩選
                                                        </button>
                                                    </div>
                                                )}
                                            </div>

                                            {/* 按鈕操作列 */}
                                            <div className="flex flex-wrap items-center gap-3 pt-4 border-t border-brand-50 justify-end md:justify-start">
                                                <button onClick={handleImportClick} className="flex-1 md:flex-none justify-center bg-white text-slate-700 border border-slate-300 px-4 py-2 rounded-xl flex items-center gap-2 text-sm font-bold hover:bg-slate-50 hover:border-slate-400 transition-all shadow-sm">
                                                    <Upload size={16} /> 匯入
                                                </button>
                                                <button onClick={handleExportExcel} className="flex-1 md:flex-none justify-center bg-brand-50 text-brand-700 border border-brand-200 px-4 py-2 rounded-xl flex items-center gap-2 text-sm font-bold hover:bg-brand-100 hover:border-brand-300 transition-all shadow-sm">
                                                    <Download size={16} /> 匯出 Excel
                                                </button>
                                                <button onClick={handleShareLine} className="flex-1 md:flex-none justify-center bg-[#06C755] text-white border border-[#06C755] px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-[#05b34c] shadow-md transition-colors">
                                                    <LineIcon size={18} /> 分享至 LINE
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* 分頁導覽 */}
                                <div className="bg-brand-100/40 p-1.5 rounded-2xl shadow-inner flex overflow-x-auto mt-4 gap-1.5 hide-scrollbar border border-brand-100 w-full">
                                    <button onClick={() => setActiveTab('list')} className={`flex-1 min-w-[140px] py-3 px-4 text-center font-bold rounded-xl transition-all flex justify-center items-center gap-2 whitespace-nowrap ${activeTab === 'list' ? 'bg-brand-600 text-white shadow-md' : 'bg-transparent text-brand-700 hover:bg-brand-200/50'}`}>
                                        <Database size={20} /> 儲存量列表
                                    </button>
                                    <button onClick={() => setActiveTab('compliance')} className={`flex-1 min-w-[140px] py-3 px-4 text-center font-bold rounded-xl transition-all flex justify-center items-center gap-2 whitespace-nowrap ${activeTab === 'compliance' ? 'bg-brand-600 text-white shadow-md' : 'bg-transparent text-brand-700 hover:bg-brand-200/50'}`}>
                                        <AlertTriangle size={20} /> 符合度表
                                    </button>
                                    <button onClick={() => setActiveTab('trend')} className={`flex-1 min-w-[140px] py-3 px-4 text-center font-bold rounded-xl transition-all flex justify-center items-center gap-2 whitespace-nowrap ${activeTab === 'trend' ? 'bg-brand-600 text-white shadow-md' : 'bg-transparent text-brand-700 hover:bg-brand-200/50'}`}>
                                        <TrendingUp size={20} /> 趨勢圖
                                    </button>
                                </div>

                                {/* 分頁內容區 */}
                                <div className="w-full">
                                    {activeTab === 'compliance' && (
                                        <div className="tab-content-active w-full">
                                            {filteredRecords.length > 0 ? (
                                                <ComplianceTables data={filteredRecords} chemicalDB={chemicalDB} />
                                            ) : emptyStateMessage}
                                        </div>
                                    )}

                                    {activeTab === 'trend' && (
                                        <div className="tab-content-active grid grid-cols-1 lg:grid-cols-2 gap-6 mt-4 w-full">
                                            {warehouseRecords.length > 0 && <TrendChart data={warehouseRecords} title="化學品趨勢 - 庫房" />}
                                            {l30Records.length > 0 && <TrendChart data={l30Records} title="化學品趨勢 - L30" />}
                                            {filteredRecords.length === 0 && emptyStateMessage}
                                        </div>
                                    )}

                                    {activeTab === 'list' && (
                                        <div className="tab-content-active w-full">
                                            <div className="flex flex-col xl:flex-row justify-between items-start xl:items-end px-2 gap-4 mt-6 mb-4">
                                                <h3 className="text-lg font-bold text-slate-800 whitespace-nowrap">
                                                    {(filterStartDate || filterEndDate || filterChemical.size > 0 || filterLocation.size > 0) ? '篩選結果列表' : '所有資料列表'} 
                                                    <span className="text-sm font-normal text-slate-500 ml-2">(共 {filteredRecords.length} 筆)</span>
                                                </h3>
                                                <div className="flex flex-wrap items-center justify-end gap-2 text-sm font-medium text-slate-600 w-full xl:w-auto">
                                                    <div className="flex items-center gap-2 bg-brand-50 px-3 py-1.5 rounded border border-brand-200 shadow-sm flex-1 sm:flex-none justify-center">
                                                        <span className="font-bold text-brand-800">危險品庫房</span>
                                                        <span className="text-brand-300">|</span>
                                                        <span>儲存量: <span className="text-brand-600 font-bold">{totalAmounts.warehouse.toFixed(2)}</span></span>
                                                    </div>
                                                    <div className="flex items-center gap-2 bg-brand-50 px-3 py-1.5 rounded border border-brand-200 shadow-sm flex-1 sm:flex-none justify-center">
                                                        <span className="font-bold text-brand-800">L30原膠室</span>
                                                        <span className="text-brand-300">|</span>
                                                        <span>儲存量: <span className="text-brand-600 font-bold">{totalAmounts.l30.toFixed(2)}</span></span>
                                                    </div>
                                                </div>
                                            </div>
                                            
                                            {warehouseRecords.length > 0 && <LocationDataList title="危險品庫房 - 儲存量列表" records={warehouseRecords} onEdit={handleEdit} onDelete={initiateDelete} selectedIds={selectedIds} onToggleSelect={handleToggleSelect} onToggleAll={handleSelectAll} onBulkDelete={initiateBulkDelete} isAdmin={isAdmin} />}
                                            {l30Records.length > 0 && <LocationDataList title="L30原膠室(C4+P1) - 儲存量列表" records={l30Records} onEdit={handleEdit} onDelete={initiateDelete} selectedIds={selectedIds} onToggleSelect={handleToggleSelect} onToggleAll={handleSelectAll} onBulkDelete={initiateBulkDelete} isAdmin={isAdmin} />}
                                            {filteredRecords.length === 0 && emptyStateMessage}
                                        </div>
                                    )}
                                </div>
                                
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
