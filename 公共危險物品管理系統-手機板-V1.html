<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>龍科廠-公共危險物品儲存量管理系統</title>
    
    <!-- 引入 React 和 Tailwind CSS -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Chart.js 用於繪製趨勢圖 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- 引入 SheetJS 用於 Excel 匯入匯出 -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    
    <!-- 設定 Tailwind: BenQ 官方配色 (BenQ Purple) -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Inter"', '"Microsoft JhengHei"', 'sans-serif'],
                    },
                    colors: {
                        slate: {
                            50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1',
                            400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155',
                            800: '#1e293b', 900: '#0f172a',
                        },
                        brand: {
                            50: '#fdfbfe',   
                            100: '#f4eff9',
                            200: '#e4d6f0',
                            300: '#cdb3e2',
                            400: '#b086cf',
                            500: '#9258b9',
                            600: '#75379d',
                            700: '#5a2285',  // BenQ 官方主色 (BenQ Purple)
                            800: '#4b1e6e',
                            900: '#3d1a58',
                            950: '#270c3b',
                        },
                        accent: {
                            400: '#fb923c', 500: '#f97316', 600: '#ea580c', 700: '#c2410c',
                        },
                        danger: '#dc2626',
                        success: '#16a34a',
                        line: '#06C755', // LINE 官方色
                    },
                    boxShadow: {
                        'card': '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)',
                        'sharp': '0 10px 15px -3px rgba(90, 34, 133, 0.15), 0 4px 6px -2px rgba(90, 34, 133, 0.05)',
                        'glow': '0 0 15px rgba(90, 34, 133, 0.3)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: "Inter", "Microsoft JhengHei", sans-serif;
            background-color: #fdfbfe;
        }
        .table-container {
            border-radius: 0.75rem;
            overflow: hidden;
            border: 1px solid #cbd5e1;
        }
        .table-bordered td, .table-bordered th {
            border: 1px solid #94a3b8 !important;
        }
        .table-header-border th {
             border: 1px solid #475569 !important;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f4eff9; }
        ::-webkit-scrollbar-thumb { background: #cdb3e2; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #b086cf; }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        input[type="checkbox"] {
            accent-color: #5a2285;
            width: 1.2rem;
            height: 1.2rem;
            cursor: pointer;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .tab-content-active {
            animation: fadeIn 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="bg-brand-50 text-slate-900 font-sans selection:bg-brand-500 selection:text-white pb-20 md:pb-0">
    <div id="root"></div>

    <!-- Firebase SDK (Module) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, deleteDoc, updateDoc, doc, onSnapshot, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfigStr = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app';
        const initialToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        if (firebaseConfigStr) {
            try {
                const app = initializeApp(JSON.parse(firebaseConfigStr));
                const auth = getAuth(app);
                const db = getFirestore(app);
                
                window.firebaseServices = {
                    auth, db, signInAnonymously, signInWithCustomToken, onAuthStateChanged,
                    collection, addDoc, deleteDoc, updateDoc, getDocs, doc, onSnapshot, query, orderBy, appId, initialToken
                };
            } catch (e) {
                console.error("Firebase 初始化失敗:", e);
            }
        }
    </script>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef, useCallback } = React;

        // --- Icons ---
        const Icon = ({ path, color = "currentColor", size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{path}</svg>
        );

        const Save = (props) => <Icon {...props} path={<><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></>} />;
        const Trash2 = (props) => <Icon {...props} path={<><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>} />;
        const Edit = (props) => <Icon {...props} path={<><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>} />;
        const Download = (props) => <Icon {...props} path={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>} />;
        const Upload = (props) => <Icon {...props} path={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></>} />;
        const Filter = (props) => <Icon {...props} path={<><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></>} />;
        const FileSpreadsheet = (props) => <Icon {...props} path={<><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h2"/><path d="M8 17h2"/><path d="M14 13h2"/><path d="M14 17h2"/></>} />;
        const PlusCircle = (props) => <Icon {...props} path={<><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></>} />;
        const AlertTriangle = (props) => <Icon {...props} path={<><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>} />;
        const CheckCircle = (props) => <Icon {...props} path={<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>} />;
        const AlertCircle = (props) => <Icon {...props} path={<><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>} />;
        const XIcon = (props) => <Icon {...props} path={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>} />;
        const Search = (props) => <Icon {...props} path={<><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>} />;
        const CalendarIcon = (props) => <Icon {...props} path={<><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>} />;
        const MapPin = (props) => <Icon {...props} path={<><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></>} />;
        const TrendingUp = (props) => <Icon {...props} path={<><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></>} />;
        const Tag = (props) => <Icon {...props} path={<><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></>} />;
        const ShieldAlert = (props) => <Icon {...props} path={<><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>} />;
        const Database = (props) => <Icon {...props} path={<><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></>} />;
        const ChevronDown = (props) => <Icon {...props} path={<><polyline points="6 9 12 15 18 9"/></>} />;
        const FlaskConical = (props) => <Icon {...props} path={<><path d="M10 2v7.527a2 2 0 0 1-.211.896L4.72 20.55a1 1 0 0 0 .9 1.45h12.76a1 1 0 0 0 .9-1.45l-5.069-10.127A2 2 0 0 1 14 9.527V2"/><line x1="10" y1="2" x2="14" y2="2"/><path d="M8.5 2h7"/></>} />;
        
        const LineIcon = ({ size = 20, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="currentColor" className={className}>
                <path d="M24 10.304c0-5.369-5.383-9.738-12-9.738-6.616 0-12 4.369-12 9.738 0 4.814 4.269 8.846 10.036 9.608.391.084.922.258 1.057.592.122.298.039.756-.057 1.156l-.37 2.12c-.097.558-.458 2.238 1.956 1.218 2.413-1.02 8.799-5.183 10.297-7.593 1.104-1.786 1.081-4.108 1.081-7.101zm-15.013 3.32h-3.465c-.255 0-.462-.206-.462-.462v-5.541c0-.255.207-.461.462-.461.255 0 .461.206.461.461v5.079h3.004c.255 0 .461.207.461.462 0 .256-.206.462-.461.462zm2.592 0h-.922c-.256 0-.462-.206-.462-.462v-5.541c0-.255.206-.461.462-.461h.922c.255 0 .461.206.461.461v5.541c0 .256-.206.462-.461.462zm4.843 0h-.843l-2.484-3.551v3.089c0 .256-.206.462-.461.462h-.922c-.256 0-.462-.206-.462-.462v-5.541c0-.255.206-.461.462-.461h.842l2.485 3.551v-3.09c0-.255.206-.461.462-.461h.921c.255 0 .462.206.462.461v5.541c0 .256-.207.462-.462.462zm3.367-2.678h-2.128v1.754h2.128c.256 0 .462.207.462.462 0 .256-.206.462-.462.462h-2.589c-.256 0-.462-.206-.462-.462v-5.541c0-.255.206-.461.462-.461h2.589c.256 0 .462.206.462.461 0 .255-.206.461-.462.461h-2.128v1.4h2.128c.256 0 .462.206.462.462 0 .255-.206.461-.462.461z"/>
            </svg>
        );

        // --- 可搜尋下拉選單元件 (通用) ---
        const SearchableSelect = React.memo(({ value, onChange, options, placeholder, icon: IconComp, onKeyDown }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [inputValue, setInputValue] = useState(value || "");
            const wrapperRef = useRef(null);

            useEffect(() => { setInputValue(value || ""); }, [value]);

            useEffect(() => {
                const handleClickOutside = (event) => { if (wrapperRef.current && !wrapperRef.current.contains(event.target)) setIsOpen(false); };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, [wrapperRef]);

            const safeOptions = options || [];
            const filteredOptions = useMemo(() => {
                const safeInput = (inputValue || "").toString().toLowerCase();
                return safeOptions.filter(opt => opt && opt.toString().toLowerCase().includes(safeInput));
            }, [safeOptions, inputValue]);

            return (
                <div className="relative w-full" ref={wrapperRef}>
                    {IconComp && <IconComp className="absolute left-3 top-2.5 text-slate-500" size={18} />}
                    <input
                        type="text" value={inputValue}
                        onChange={(e) => { setInputValue(e.target.value); onChange(e.target.value); setIsOpen(true); }}
                        onFocus={() => setIsOpen(true)} onKeyDown={onKeyDown} placeholder={placeholder}
                        className={`w-full px-3 py-2.5 text-sm md:text-base border border-slate-300 rounded-lg bg-slate-50 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all box-border ${IconComp ? 'pl-10' : ''}`}
                        autoComplete="off"
                    />
                    <button type="button" onClick={() => setIsOpen(!isOpen)} className="absolute right-2 top-2.5 text-slate-500 hover:text-slate-700 transition-colors"><ChevronDown size={16} /></button>
                    {isOpen && (
                        <ul className="absolute z-50 w-full bg-white border border-slate-200 rounded-lg shadow-xl max-h-60 overflow-y-auto overflow-x-hidden mt-1 py-1">
                            <li className="p-3 md:p-2 text-sm hover:bg-brand-50 cursor-pointer transition-colors text-slate-400 italic" onMouseDown={() => { setInputValue(""); onChange(""); setIsOpen(false); }}>-- 清除選擇 --</li>
                            {filteredOptions.length > 0 ? (
                                filteredOptions.map(opt => (
                                    <li key={opt} className="p-3 md:p-2 text-sm hover:bg-brand-50 hover:text-brand-700 cursor-pointer transition-colors border-b border-slate-50 last:border-0" onMouseDown={() => { setInputValue(opt); onChange(opt); setIsOpen(false); }}>{opt}</li>
                                ))
                            ) : (<li className="p-3 text-sm text-slate-400 text-center">無符合項目</li>)}
                        </ul>
                    )}
                </div>
            );
        });

        // --- MultiSelect Dropdown (Generic) ---
        const MultiSelectDropdown = ({ options, selected, onChange, label, placeholder = "選擇項目" }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [searchTerm, setSearchTerm] = useState("");
            const wrapperRef = useRef(null);

            useEffect(() => {
                const handleClickOutside = (event) => { if (wrapperRef.current && !wrapperRef.current.contains(event.target)) setIsOpen(false); };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);

            useEffect(() => { if (!isOpen) setSearchTerm(""); }, [isOpen]);

            const currentSelected = useMemo(() => (selected instanceof Set) ? selected : new Set(), [selected]);
            const safeOptions = options || [];

            const displayedOptions = useMemo(() => {
                if (!searchTerm) return safeOptions;
                return safeOptions.filter(opt => opt.toLowerCase().includes(searchTerm.toLowerCase()));
            }, [safeOptions, searchTerm]);

            const toggleOption = (option) => {
                const newSelected = new Set(currentSelected);
                if (newSelected.has(option)) newSelected.delete(option);
                else newSelected.add(option);
                onChange(newSelected);
            };

            const toggleAll = () => {
                if (currentSelected.size === safeOptions.length) onChange(new Set());
                else onChange(new Set(safeOptions));
            }

            let displayLabel = label;
            if (!label) {
                if (currentSelected.size === 0) displayLabel = placeholder;
                else if (currentSelected.size === safeOptions.length) displayLabel = "全部選取";
                else displayLabel = `已選 ${currentSelected.size} 項`;
            } else {
                 displayLabel = `${label} (${currentSelected.size === 0 ? '無' : (currentSelected.size === safeOptions.length ? '全部' : currentSelected.size)})`;
            }
            
            const isFilterBar = !label;

            return (
                <div className="relative w-full" ref={wrapperRef}>
                    <button 
                        onClick={() => setIsOpen(!isOpen)} 
                        className={isFilterBar 
                            ? "w-full bg-slate-50 border border-slate-300 rounded-xl px-3 py-2.5 text-sm md:text-base focus:ring-2 focus:ring-brand-500 outline-none hover:bg-white transition-colors cursor-pointer text-slate-800 text-left flex justify-between items-center box-border"
                            : "flex items-center gap-2 bg-white border border-slate-300 text-slate-700 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-brand-50 transition-colors shadow-sm"
                        }
                    >
                        {!isFilterBar && <Filter size={14} />}
                        <span className="truncate">{displayLabel}</span>
                        <ChevronDown size={isFilterBar ? 16 : 14} />
                    </button>
                    {isOpen && (
                        <div className="absolute right-0 md:left-0 top-full mt-2 w-full min-w-[240px] bg-white border border-slate-200 rounded-xl shadow-xl z-50 overflow-hidden flex flex-col max-h-80">
                            <div className="p-3 md:p-2 border-b border-slate-100 bg-slate-50 flex justify-between items-center shrink-0">
                                <span className="text-sm md:text-xs font-bold text-slate-500">選擇顯示項目</span>
                                <button onClick={toggleAll} className="text-sm md:text-xs text-brand-600 font-bold hover:underline">
                                    {currentSelected.size === safeOptions.length ? '取消全選' : '全選'}
                                </button>
                            </div>
                            <div className="p-2 border-b border-slate-100 bg-white shrink-0">
                                <input type="text" placeholder="搜尋選項..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="w-full p-2 md:p-1.5 text-base md:text-sm border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 outline-none" onClick={(e) => e.stopPropagation()} onKeyDown={(e) => e.stopPropagation()} />
                            </div>
                            <div className="overflow-y-auto p-2 space-y-1 custom-scrollbar">
                                {displayedOptions.length > 0 ? displayedOptions.map(opt => (
                                    <label key={opt} className="flex items-start gap-3 md:gap-2 p-3 md:p-2 hover:bg-brand-50 rounded-lg cursor-pointer transition-colors select-none border-b border-slate-50 last:border-0">
                                        <input type="checkbox" checked={currentSelected.has(opt)} onChange={() => toggleOption(opt)} className="mt-0.5 md:mt-1 rounded border-slate-300 text-brand-600 focus:ring-brand-500 w-5 h-5 md:w-4 md:h-4 accent-brand-600 shrink-0" />
                                        <span className="text-base md:text-sm text-slate-700 font-medium break-words whitespace-normal">{opt}</span>
                                    </label>
                                )) : <div className="text-center text-sm md:text-xs text-slate-400 p-4">無選項</div>}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- 標示版名稱正規化函式 (避免產生未申請的冗餘列) ---
        const normalizeLabelCategory = (cat) => {
            if (!cat) return '未分類';
            if (cat === '乙酸乙酯(Ethyl Acetate)') return '乙酸乙酯';
            if (cat === '乙酸正丁酯(n-Butyl acetate) BAC') return '乙酸正丁酯';
            return cat;
        };

        // --- Constants ---
        const HAZARD_TYPES = ["酒精類", "第一石油類", "第二石油類", "第三石油類", "第四石油類"];
        const SOLUBILITY_TYPES = ["水溶性", "非水溶性"];
        const STORAGE_LOCATIONS = ["危險品庫房", "C4原膠室", "P1原膠室"];

        // --- Configs & DB (已更新為最新需求之數值) ---
        const WAREHOUSE_STATS_CONFIG = [
            { type: "第一石油類", items: [ { name: "添加劑", limit: 7769.00, statLimit: 200 }, { name: "乙酸乙酯", limit: 7520.00, statLimit: 200 }, { name: "丁酮", limit: 660.00, statLimit: 200 }, { name: "乙酸正丙酯(NPA)", limit: 720.00, statLimit: 200 }, { name: "C0301廢棄物(第一石油類)", limit: 9600.00, statLimit: 200 } ] },
            { type: "第二石油類", items: [ { name: "丙二醇甲醚醋酸酯", limit: 1520.00, statLimit: 1000 }, { name: "乙酸正丁酯", limit: 7200.00, statLimit: 1000 }, { name: "正丁醇", limit: 1650.00, statLimit: 1000 }, { name: "添加劑", limit: 6203.00, statLimit: 1000 }, { name: "感壓膠", limit: 33480.00, statLimit: 1000 }, { name: "C0301廢棄物(第二石油類)", limit: 16000.00, statLimit: 1000 } ] },
            { type: "第三石油類", items: [ { name: "添加劑", limit: 500.00, statLimit: 2000 }, { name: "UV感壓膠", limit: 3500.00, statLimit: 2000 } ] }
        ];

        const L30_STATS_CONFIG = [
            { type: "第一石油類", items: [ { name: "乙酸乙酯", limit: 2431.20, statLimit: 200 }, { name: "添加劑", limit: 400.00, statLimit: 200 } ] },
            { type: "第二石油類", items: [ { name: "乙酸正丁酯", limit: 720.00, statLimit: 1000 }, { name: "丙二醇甲醚醋酸酯", limit: 760.00, statLimit: 1000 }, { name: "添加劑", limit: 340.00, statLimit: 1000 }, { name: "感壓膠", limit: 24370.00, statLimit: 1000 } ] },
            { type: "第三石油類", items: [ { name: "添加劑", limit: 111.00, statLimit: 2000 } ] },
            { type: "酒精類", items: [ { name: "異丙醇", limit: 320.00, statLimit: 400 } ] }

        // --- TrendChart Component (Safe & High Contrast & Filterable) ---
        const TrendChart = React.memo(({ data, title }) => {
            const chartRef = useRef(null);
            const chartInstance = useRef(null);
            
            const allChemicals = useMemo(() => {
                if (!Array.isArray(data)) return [];
                return [...new Set(data.map(r => String(r.chemical || "Unknown")))].sort();
            }, [data]);
            
            const [selectedChemicals, setSelectedChemicals] = useState(new Set());

            useEffect(() => {
                if (allChemicals.length > 0) {
                     setSelectedChemicals(new Set(allChemicals));
                }
            }, [JSON.stringify(allChemicals)]); 

            const chartData = useMemo(() => {
                const dataMap = {}; 
                const datesSet = new Set();

                if (Array.isArray(data)) {
                    data.forEach(r => {
                        if (r && r.date) {
                            if (!dataMap[r.date]) dataMap[r.date] = {};
                            const chem = String(r.chemical || "Unknown");
                            if (!dataMap[r.date][chem]) dataMap[r.date][chem] = 0;
                            dataMap[r.date][chem] += Number(r.amount) || 0;
                            datesSet.add(r.date);
                        }
                    });
                }

                const allDates = Array.from(datesSet).sort();
                const currentSelected = selectedChemicals instanceof Set ? selectedChemicals : new Set();
                const chemicals = allChemicals.filter(c => currentSelected.has(c));

                const CHART_COLORS = [
                    '#dc2626', '#2563eb', '#d97706', '#16a34a', '#7c3aed', '#db2777', '#0891b2', 
                    '#4f46e5', '#ca8a04', '#0d9488', '#be123c', '#1e3a8a', '#9333ea', '#15803d', '#c026d3'
                ];

                const datasets = chemicals.map((chem, index) => {
                    const chemData = allDates.map(date => {
                        return (dataMap[date] && dataMap[date][chem]) || 0;
                    });
                    
                    const originalIndex = allChemicals.indexOf(chem);
                    const color = CHART_COLORS[Math.abs(originalIndex) % CHART_COLORS.length];

                    return {
                        label: chem, data: chemData, borderColor: color, backgroundColor: color, 
                        borderWidth: 3, tension: 0.4, fill: false, pointRadius: 0, pointHoverRadius: 6,
                        pointBackgroundColor: '#fff', pointBorderColor: color, pointBorderWidth: 2
                    };
                });
                return { labels: allDates, datasets: datasets };
            }, [data, selectedChemicals, allChemicals]);

            useEffect(() => {
                if (chartRef.current) {
                    if (chartInstance.current) { chartInstance.current.destroy(); }
                    const ctx = chartRef.current.getContext('2d');
                    
                    if (chartData.labels.length === 0 && chartData.datasets.length === 0) return;

                    chartInstance.current = new Chart(ctx, {
                        type: 'line',
                        data: chartData,
                        options: {
                            responsive: true, maintainAspectRatio: false,
                            interaction: { mode: 'nearest', axis: 'xy', intersect: false },
                            plugins: {
                                legend: { position: 'top', align: 'start', labels: { boxWidth: 10, usePointStyle: true, padding: 10, font: { family: "'Inter', sans-serif", size: 11, weight: 'bold' }, color: '#1e3a8a' } },
                                tooltip: { backgroundColor: 'rgba(90, 34, 133, 0.95)', titleColor: '#fff', titleFont: { size: 14, weight: 'bold' }, bodyColor: '#f4eff9', bodyFont: { size: 13 }, padding: 12, boxPadding: 6, usePointStyle: true, cornerRadius: 8, displayColors: true }
                            },
                            scales: {
                                y: { beginAtZero: true, border: { display: true, color: '#94a3b8', width: 2 }, grid: { color: '#e2e8f0', borderDash: [4, 4] }, ticks: { color: '#475569', font: { size: 12, weight: 'bold' }, padding: 10 }, title: { display: true, text: '儲存量 (kg/L)', color: '#1e293b', font: { size: 14, weight: 'bold' } } },
                                x: { border: { display: true, color: '#94a3b8', width: 2 }, grid: { display: false }, ticks: { color: '#1e3a8a', font: { size: 12, weight: 'bold' }, maxRotation: 45, minRotation: 45, autoSkip: false } }
                            }
                        }
                    });
                }
                return () => { if (chartInstance.current) { chartInstance.current.destroy(); } };
            }, [chartData]);

            if (!data || data.length === 0) return null;

            return (
                <div className="bg-white rounded-2xl shadow-sharp border border-slate-300 p-6 mt-0 relative group h-[500px]">
                    <div className="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-brand-500 via-brand-700 to-brand-900 rounded-t-2xl"></div>

                        </div>
                    </div>
                    <div className="h-[400px] w-full"><canvas ref={chartRef}></canvas></div>
                </div>
            );

        // --- ZoneComplianceTable Component (Safe) ---
        const ZoneComplianceTable = React.memo(({ title, records, config, chemicalDB }) => {
            
            const dynamicConfig = useMemo(() => {
                let newConfig = JSON.parse(JSON.stringify(config));
                const recordChemicals = {};
                
                // 套用正規化，將不想要的尾綴統一合併，並收集到 recordChemicals
                records.forEach(r => { 
                    if(r.chemical) {
                        recordChemicals[r.chemical] = { ...r, labelCategory: normalizeLabelCategory(r.labelCategory) };
                    }
                });
                
                const existingConfigItems = new Set();
                newConfig.forEach(group => { group.items.forEach(item => { existingConfigItems.add(item.name); }); });
                
                Object.keys(recordChemicals).forEach(chemName => {
                    const rec = recordChemicals[chemName];
                    const labelCat = rec.labelCategory; 
                    const type = rec.type;
                    const chemInfo = chemicalDB[chemName];
                    const statLimit = chemInfo ? chemInfo.limit : (rec.limit || 0); 
                    
                    let group = newConfig.find(g => g.type === type);
                    if (!group) { group = { type: type || '其他', items: [] }; newConfig.push(group); }
                    
                    const existingItem = group.items.find(i => i.name === labelCat);
                    if (!existingItem) { group.items.push({ name: labelCat, limit: 0, statLimit: statLimit }); }
                });
                return newConfig;
            }, [records, config, chemicalDB]);

            const tableData = useMemo(() => {
                const actualsMap = {};
                records.forEach(r => {
                    const labelCat = normalizeLabelCategory(r.labelCategory);
                    const type = r.type || '未分類';
                    const key = `${type}_${labelCat}`;
                    if (!actualsMap[key]) actualsMap[key] = 0;
                    actualsMap[key] += Number(r.amount) || 0;
                });
                return dynamicConfig.map(typeGroup => {
                    let typeGroupTotalApp = 0, typeGroupTotalLegalRatio = 0, typeGroupActualTotalRatio = 0, typeGroupTotalActual = 0; 
                    const subRows = typeGroup.items.map(item => {
                        const appAmount = item.limit; 
                        const statLimit = item.statLimit; 
                        const legalRatio = statLimit > 0 ? (appAmount / statLimit) : 0;
                        const lookupKey = `${typeGroup.type}_${item.name}`;
                        const actualAmount = actualsMap[lookupKey] || 0;
                        const actualRatio = statLimit > 0 ? (actualAmount / statLimit) : 0;
                        let excessAmount = 0;
                        if (appAmount === 0 && actualAmount > 0) { excessAmount = actualAmount; } 
                        else if (actualAmount > appAmount) { excessAmount = actualAmount - appAmount; }
                        
                        typeGroupTotalApp += appAmount;
                        typeGroupTotalLegalRatio += legalRatio;
                        typeGroupActualTotalRatio += actualRatio;
                        typeGroupTotalActual += actualAmount;
                        
                        return { name: item.name, limit: appAmount, legalRatio: legalRatio, actualAmount: actualAmount, excess: excessAmount, actualRatio: actualRatio, isUnapplied: appAmount === 0 };
                    });
                    const totalComplianceRatio = typeGroupTotalApp > 0 ? (typeGroupTotalActual / typeGroupTotalApp) : (typeGroupTotalActual > 0 ? Infinity : 0);
                    return { type: typeGroup.type, totalApp: typeGroupTotalApp, totalLegalRatio: typeGroupTotalLegalRatio, actualTotalRatio: typeGroupActualTotalRatio, totalComplianceRatio: totalComplianceRatio, subRows: subRows };
                });
            }, [records, dynamicConfig]);

            const zoneSummary = useMemo(() => {
                 let totalRatio = 0;
                 let totalAmount = records.reduce((sum, r) => sum + (Number(r.amount) || 0), 0);
                 const actualsMap = {};
                 records.forEach(r => { 
                     const labelCat = normalizeLabelCategory(r.labelCategory);
                     const key = `${r.type}_${labelCat}`; 
                     if (!actualsMap[key]) actualsMap[key] = 0; 
                     actualsMap[key] += Number(r.amount) || 0; 
                 });
                 dynamicConfig.forEach(typeGroup => { 
                     typeGroup.items.forEach(item => { 
                         const lookupKey = `${typeGroup.type}_${item.name}`; 
                         const actualAmount = actualsMap[lookupKey] || 0; 
                         const statLimit = item.statLimit; 
                         const ratio = statLimit > 0 ? (actualAmount / statLimit) : 0; 
                         totalRatio += ratio; 
                     }); 
                 });
                 return { totalRatio, totalAmount };
            }, [records, dynamicConfig]);

            if (records.length === 0) return null;

            return (
                <div className="bg-white rounded-2xl shadow-sharp border border-slate-300 mt-6 overflow-hidden transition-shadow hover:shadow-xl">
                    <div className="p-5 border-b border-slate-200 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-brand-50">
                        <h3 className="text-xl font-extrabold text-brand-900 flex items-center gap-2">
                            <div className="p-2 bg-brand-100 rounded-lg text-brand-600 border border-brand-200"><AlertTriangle size={24} /></div>
                            {title}
                        </h3>
                        <div className="flex items-center gap-6 text-sm">
                            <div className="flex flex-col items-end"><span className="text-xs text-brand-600 uppercase tracking-widest font-bold">總倍數</span><span className={`text-2xl font-black ${zoneSummary.totalRatio >= 30 ? 'text-danger' : 'text-brand-800'}`}>{zoneSummary.totalRatio.toFixed(2)}</span></div>
                            <div className="w-px h-10 bg-brand-200"></div>
                            <div className="flex flex-col items-end"><span className="text-xs text-brand-600 uppercase tracking-widest font-bold">總儲存量</span><span className="text-2xl font-black text-brand-900">{zoneSummary.totalAmount.toFixed(2)}</span></div>
                        </div>
                    </div>
                    <div className="overflow-x-auto">
                        <table className="w-full text-center border-collapse table-bordered table-header-border text-sm">
                            <thead>
                                <tr>
                                    <th className="bg-brand-800 text-white p-3 w-28 font-bold tracking-wide border-r border-brand-700">危物種類</th>
                                    <th colSpan="5" className="bg-slate-50 text-slate-900 p-3 font-extrabold uppercase tracking-wider text-xs border-b border-slate-300">合法申請量(標示版)</th>
                                    <th colSpan="3" className="bg-slate-50 text-slate-900 p-3 font-extrabold uppercase tracking-wider text-xs border-l border-b border-slate-300">實際儲存及符合度-By 標示版分類</th>
                                    <th className="bg-slate-100 text-slate-900 p-3 w-32 font-extrabold uppercase tracking-wider text-xs border-l border-b border-slate-300">實際儲存及符合度-by 總量</th>
                                </tr>
                                <tr className="text-xs text-slate-800 bg-white border-b border-slate-300">

                                                <td className={`p-3 font-bold border-r border-slate-300 ${isExcess || (isUnapplied && sub.actualAmount > 0) ? 'bg-red-50/50 text-danger' : 'text-success'}`}>{isUnapplied && sub.actualAmount > 0 ? "超量" : (sub.actualAmount === 0 ? "-" : (isExcess ? "超量" : "符合"))}</td>

        const LocationDataList = React.memo(({ title, records, onEdit, onDelete, selectedIds, onToggleSelect, onToggleAll, onBulkDelete, isAdmin }) => {
            const zoneStats = useMemo(() => {
                 const actualsMap = {};
                 records.forEach(r => {
                     const labelCat = normalizeLabelCategory(r.labelCategory);
                     const key = `${r.type}_${labelCat}`;
                     if (!actualsMap[key]) actualsMap[key] = 0;
                     actualsMap[key] += Number(r.amount) || 0;

                            <label htmlFor={`selectAll-${title}`} className="text-sm font-bold text-slate-600">全選所有項目</label>

                        {records.map((record) => {

                                        <div className="flex gap-3 items-start">
                                            <input type="checkbox" checked={selectedIds.has(record.id)} onChange={() => onToggleSelect(record.id)} className="mt-1 w-5 h-5 accent-brand-600 rounded border-gray-300 focus:ring-brand-500" />
                                            <div>

                        })}
                    </div>

                    {/* 電腦版：表格 */}
                    <div className="hidden lg:block overflow-x-auto">
                        <table className="w-full text-left border-collapse min-w-[1000px]">
                            <thead>
                                <tr className="bg-slate-100 border-b border-slate-300 text-slate-700 text-xs uppercase tracking-wider font-extrabold">

                                        <input type="checkbox" checked={allSelected} onChange={() => onToggleAll(records.map(r => r.id), !allSelected)} className="w-4 h-4 text-brand-600 border-gray-300 rounded focus:ring-brand-500" />

                                    <th className="p-4 text-center whitespace-nowrap">庫存盤點日期</th>
                                    <th className="p-4 text-center whitespace-nowrap">建檔日期</th>
                                    <th className="p-4 text-center">儲存場所</th>
                                    <th className="p-4 text-center">標示版歸類</th>
                                    <th className="p-4 w-48 text-center">化學品名稱</th>
                                    <th className="p-4 text-center">料號</th>
                                    <th className="p-4 text-center">危物分類</th>
                                    <th className="p-4 text-center">種類</th>
                                    <th className="p-4 text-center">水溶性</th>
                                    <th className="p-4 text-center">管制量(L)</th>
                                    <th className="p-4 text-center">閃火點</th>
                                    <th className="p-4 text-center">儲存量</th>
                                    <th className="p-4 text-center">倍數</th>
                                    <th className="p-4 text-center" style={{width: "120px"}}>操作</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-200 text-sm">
                                {records.map((record) => (
                                    <tr key={record.id} className={`hover:bg-brand-50/50 transition-colors group ${selectedIds.has(record.id) ? 'bg-brand-50' : ''}`}>
                                        <td className="p-4 text-center">
                                            <input type="checkbox" checked={selectedIds.has(record.id)} onChange={() => onToggleSelect(record.id)} className="w-4 h-4 text-brand-600 border-gray-300 rounded focus:ring-brand-500" />
